<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        /* TVÉ KOMPLETNÍ ORIGINÁLNÍ STYLY */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); color: #fff; padding: 20px; min-height: 100vh; transition: background 0.3s; }
        body.light-mode { background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        h1 { text-align: center; font-size: 3em; color: #2a7dd9; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); font-weight: bold; flex: 1; }
        .dark-mode-toggle { background: #2a7dd9; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 1.2em; }
        .dark-mode-toggle:hover { background: #4a9eff; transform: scale(1.05); }
        body.light-mode .dark-mode-toggle { background: #333; }
        .admin-panel { background: rgba(0, 0, 0, 0.6); border: 2px solid #2a7dd9; border-radius: 10px; padding: 20px; margin-bottom: 30px; display: none; gap: 10px; flex-wrap: wrap; align-items: center; }
        body.admin-mode .admin-panel { display: flex; }
        .admin-panel input { padding: 12px 15px; border: 2px solid #2a7dd9; border-radius: 5px; background: rgba(0,0,0,0.7); color: #fff; font-size: 1em; flex: 1; min-width: 250px; }
        body.light-mode .admin-panel input { background: rgba(255, 255, 255, 0.9); color: #333; border: 2px solid #333; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: #2a7dd9; color: #fff; }
        .btn-danger { background: #cc3333; color: #fff; }
        .kit-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .kit-tab { padding: 12px 25px; border: 2px solid #1a1a1a; background: rgba(0,0,0,0.5); color: #888; border-radius: 25px; cursor: pointer; transition: all 0.3s; font-weight: bold; display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease-out; }
        .kit-tab.active { background: #ffa500; color: #000; border-color: #ffa500; box-shadow: 0 0 20px rgba(255, 165, 0, 0.5); }
        .tier-section { margin-bottom: 40px; animation: slideIn 0.3s ease-out; }
        .tier-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .tier-line { flex: 1; height: 1px; background: #444; }
        .tier-title { font-size: 1.3em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; min-width: 150px; text-align: center; }
        .tier-God .tier-title { color: #ff3333; }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #66aaff; }
        .tier-Noob .tier-title { color: #44dd44; }
        .tier-Down .tier-title { color: #555555; }
        .tier-UNC\ GOD .tier-title { color: #ff3366; }
        .tier-UNC\ Hacker .tier-title { color: #9955ff; }
        .tier-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .tier-player-card { background: rgba(0, 0, 0, 0.5); border: 2px solid #1a1a1a; border-radius: 10px; padding: 15px; transition: all 0.3s; position: relative; display: flex; align-items: center; gap: 12px; cursor: pointer; animation: slideIn 0.3s ease-out; }
        .tier-player-card:hover { border-color: #2a7dd9; transform: translateY(-5px); box-shadow: 0 0 20px rgba(42, 125, 217, 0.3); }
        .tier-badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: bold; min-width: 50px; text-align: center; pointer-events: none; }
        body.admin-mode .tier-badge { pointer-events: auto; cursor: pointer; }
        .tier-God .tier-badge { background: #ff3333; color: #fff; }
        .tier-Hacker .tier-badge { background: #ff8800; color: #fff; }
        .tier-Pro .tier-badge { background: #2a9eff; color: #fff; }
        .tier-Normal .tier-badge { background: #66aaff; color: #000; }
        .tier-Noob .tier-badge { background: #44dd44; color: #000; }
        .tier-Down .tier-badge { background: #555555; color: #fff; }
        .tier-UNC\ GOD .tier-badge { background: #ff3366; color: #fff; }
        .tier-UNC\ Hacker .tier-badge { background: #9955ff; color: #fff; }
        .tier-player-avatar { width: 50px; height: 50px; border-radius: 5px; border: 2px solid #2a7dd9; flex-shrink: 0; object-fit: cover; }
        .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #2a7dd9; transition: 0.3s; cursor: pointer; }
        .ranking-number { font-size: 2em; font-weight: bold; min-width: 90px; text-align: center; padding: 20px 25px; border-radius: 15px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .rank-1 .ranking-number { background: #FFD700 !important; color: #000; box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        .rank-2 .ranking-number { background: #C0C0C0 !important; color: #000; box-shadow: 0 0 25px rgba(192, 192, 192, 0.7); }
        .rank-3 .ranking-number { background: #CD7F32 !important; color: #fff; box-shadow: 0 0 25px rgba(205, 127, 50, 0.7); }
        .profile-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.98); border: 3px solid #2a7dd9; border-radius: 15px; padding: 40px; z-index: 1000; display: none; min-width: 600px; }
        .profile-modal.active { display: flex; flex-direction: column; }
        .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; backdrop-filter: blur(5px); }
        .modal-backdrop.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-login { position: fixed; bottom: 10px; left: 10px; font-size: 0.8em; color: #666; cursor: pointer; opacity: 0.4; }
        .delete-tier-btn { position: absolute; top: 8px; right: 8px; background: #cc3333; color: #fff; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; border: none; font-weight: bold; }
        body.admin-mode .tier-player-card:hover .delete-tier-btn { display: flex; }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 / ☀️</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>
        <div class="ranking-container" id="rankingContainer" style="display: none;">
            <div class="overall-ranking" id="overallRanking"></div>
        </div>
        <div id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    <div class="profile-modal" id="profileModal">
        <div id="profileContent"></div>
        <button class="btn btn-danger" onclick="closeModal()" style="margin-top: 20px;">Zavřít</button>
    </div>
    <div class="edit-tier-modal" id="editModal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #2a7dd9; padding: 30px; z-index: 1001; display: none; border-radius: 10px; flex-direction: column; gap: 15px;">
        <h3 style="color: #2a7dd9;">Změnit Tier</h3>
        <select id="editTierSelect" style="padding:10px; background:#000; color:#fff; border:1px solid #2a7dd9;"></select>
        <button class="btn btn-primary" onclick="saveEditModal()">Uložit</button>
        <button class="btn btn-danger" onclick="closeModal()">Zrušit</button>
    </div>

    <div class="admin-login" onclick="promptAdmin()">Admin login</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Tvoje Firebase konfigurace
        const firebaseConfig = {
            apiKey: "AIzaSyDUIlqycMT_3vhN-MHwfSC2nl_fkxDnsRY",
            authDomain: "tierlist-360c8.firebaseapp.com",
            projectId: "tierlist-360c8",
            storageBucket: "tierlist-360c8.firebasestorage.app",
            messagingSenderId: "634800924408",
            appId: "1:634800924408:web:55ee22f866330a2630fd0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playersRef = ref(db, 'players');

        // Konstanty zachovány z tvého souboru
        const TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'UNC GOD', 'UNC Hacker', 'Unranked'];
        const TIER_LABELS = { 'God':'GOD', 'Hacker':'HCKR', 'Pro':'PRO', 'Normal':'NRML', 'Noob':'NOOB', 'Down':'DOWN', 'UNC GOD':'UGOD', 'UNC Hacker':'UHCK', 'Unranked':'URK' };
        const TIER_COLORS = { 'God':'#ff3333', 'Hacker':'#ff8800', 'Pro':'#2a9eff', 'Normal':'#66aaff', 'Noob':'#44dd44', 'Down':'#555555', 'UNC GOD':'#ff3366', 'UNC Hacker':'#9955ff', 'Unranked':'#444' };
        const TIER_POINTS = { 'God':35, 'Hacker':20, 'Pro':10, 'Normal':5, 'Noob':3, 'Down':1, 'UNC GOD':32, 'UNC Hacker':18, 'Unranked':0 };
        const ALL_KITS = [{ name: 'Overall', icon: '🏆' }, { name: 'Pickaxe', icon: '⛏️' }, { name: 'PoorSMP', icon: '🦃' }, { name: 'Elytri', icon: '🔱' }, { name: 'Prasečí jízda', icon: '🐷' }];
        const KIT_EMOJIS = { 'Pickaxe': '⛏️', 'PoorSMP': '🦃', 'Elytri': '🔱', 'Prasečí jízda': '🐷' };

        let players = [];
        let currentKit = 'Overall';
        let isAdmin = false;
        let searchQuery = '';
        let editingPlayerId = null;
        let editingKitName = null;

        // NAČÍTÁNÍ DAT Z FIREBASE
        onValue(playersRef, (snapshot) => {
            const data = snapshot.val();
            players = data ? Object.values(data) : [];
            render();
        });

        window.toggleDarkMode = () => document.body.classList.toggle('light-mode');
        window.promptAdmin = () => { if(prompt("Heslo:") === "zombie1302") { isAdmin = true; document.body.classList.add('admin-mode'); render(); } };

        window.addPlayer = () => {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const newPlayer = { id: Date.now(), name, kits: { 'Pickaxe': 'Unranked', 'PoorSMP': 'Unranked', 'Elytri': 'Unranked', 'Prasečí jízda': 'Unranked' } };
            players.push(newPlayer);
            set(playersRef, players);
            document.getElementById('playerNameInput').value = '';
        };

        window.deletePlayer = (id) => { if(confirm("Smazat?")) { players = players.filter(p => p.id !== id); set(playersRef, players); } };

        window.openProfileModal = (id) => {
            const p = players.find(x => x.id === id);
            const total = Object.values(p.kits).reduce((s, t) => s + (TIER_POINTS[t] || 0), 0);
            document.getElementById('profileContent').innerHTML = `
                <div style="display:flex; gap:20px; border-bottom:2px solid #2a7dd9; padding-bottom:15px;">
                    <img src="https://mc-heads.net/body/${p.name}/150.png" style="height:180px;">
                    <div><h2>${p.name}</h2><p style="color:#ffa500; font-weight:bold;">Body: ${total}</p></div>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;">
                    ${Object.entries(p.kits).map(([k, t]) => `<div style="border:1px solid #2a7dd9; padding:10px; border-radius:5px; text-align:center;">${KIT_EMOJIS[k]}<br><b style="color:${TIER_COLORS[t]}">${TIER_LABELS[t]}</b></div>`).join('')}
                </div>`;
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.openEditModal = (id, kit) => {
            if(!isAdmin) return;
            editingPlayerId = id; editingKitName = kit;
            const p = players.find(x => x.id === id);
            const select = document.getElementById('editTierSelect');
            select.innerHTML = TIERS.map(t => `<option value="${t}" ${p.kits[kit] === t ? 'selected' : ''}>${t}</option>`).join('');
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.saveEditModal = () => {
            const p = players.find(x => x.id === editingPlayerId);
            p.kits[editingKitName] = document.getElementById('editTierSelect').value;
            set(playersRef, players);
            window.closeModal();
        };

        window.closeModal = () => {
            document.getElementById('profileModal').classList.remove('active');
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('modalBackdrop').classList.remove('active');
        };

        window.setKit = (n) => { currentKit = n; render(); };
        window.updateSearch = (v) => { searchQuery = v.toLowerCase(); render(); };

        function render() {
            document.getElementById('kitTabs').innerHTML = ALL_KITS.map(k => `<div class="kit-tab ${currentKit === k.name ? 'active' : ''}" onclick="setKit('${k.name}')">${k.icon} ${k.name}</div>`).join('');
            if (currentKit === 'Overall') {
                document.getElementById('rankingContainer').style.display = 'block';
                document.getElementById('tierlistContainer').style.display = 'none';
                renderOverall();
            } else {
                document.getElementById('rankingContainer').style.display = 'none';
                document.getElementById('tierlistContainer').style.display = 'block';
                renderTierlist();
            }
        }

        function renderOverall() {
            const sorted = [...players].sort((a,b) => {
                const getP = (x) => Object.values(x.kits).reduce((s,t) => s + (TIER_POINTS[t]||0), 0);
                return getP(b) - getP(a);
            }).filter(p => p.name.toLowerCase().includes(searchQuery));

            document.getElementById('overallRanking').innerHTML = `
                <input type="text" placeholder="🔍 Hledat..." oninput="updateSearch(this.value)" value="${searchQuery}" style="width:100%; padding:15px; background:rgba(0,0,0,0.7); border:2px solid #2a7dd9; color:#fff; border-radius:8px; margin-bottom:20px;">
                ${sorted.map((p, i) => `
                    <div class="ranking-item rank-${i+1}" onclick="openProfileModal(${p.id})">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="ranking-number">#${i+1}</div>
                            <img src="https://mc-heads.net/avatar/${p.name}/64" style="border-radius:5px;">
                            <div><b>${p.name}</b><br><span style="color:#ffa500;">${Object.values(p.kits).reduce((s,t)=>s+(TIER_POINTS[t]||0),0)} Bodů</span></div>
                        </div>
                    </div>`).join('')}`;
        }

        function renderTierlist() {
            const div = document.getElementById('tierlistContainer');
            div.innerHTML = '';
            TIERS.forEach(t => {
                const list = players.filter(p => p.kits[currentKit] === t);
                if (list.length === 0 && t !== 'Unranked') return;
                const sec = document.createElement('div');
                sec.className = `tier-section tier-${t.replace(/\s+/g, '-')}`;
                sec.innerHTML = `<div class="tier-header"><div class="tier-line"></div><div class="tier-title">${t}</div><div class="tier-line"></div></div>
                <div class="tier-players">${list.map(p => `
                    <div class="tier-player-card" onclick="openProfileModal(${p.id})">
                        <button class="delete-tier-btn" onclick="event.stopPropagation(); deletePlayer(${p.id});">×</button>
                        <img src="https://mc-heads.net/avatar/${p.name}/64" class="tier-player-avatar">
                        <div style="flex:1;"><b>${p.name}</b></div>
                        <div class="tier-badge" onclick="event.stopPropagation(); openEditModal(${p.id}, '${currentKit}')">${TIER_LABELS[t]}</div>
                    </div>`).join('')}</div>`;
                div.appendChild(sec);
            });
        }
    </script>
</body>
</html>
