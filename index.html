<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist - LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #2a7dd9;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-weight: bold;
            flex: 1;
        }

        .dark-mode-toggle {
            background: #2a7dd9;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        body.admin-mode .admin-panel {
            display: flex;
        }

        .admin-panel input {
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1em;
            flex: 1;
            min-width: 250px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary { background: #2a7dd9; color: #fff; }
        .btn-danger { background: #cc3333; color: #fff; }

        .kit-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kit-tab {
            padding: 12px 25px;
            border: 2px solid #1a1a1a;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kit-tab.active {
            background: #ffa500;
            color: #000;
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
        }

        .tier-section { margin-bottom: 40px; }

        .tier-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .tier-line { flex: 1; height: 1px; background: #444; }

        .tier-title {
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 150px;
            text-align: center;
        }

        /* Barvy Tierů - Všechny tvé barvy */
        .tier-God .tier-title { color: #ff3333; }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #00ff00; }
        .tier-Noob .tier-title { color: #ffff00; }
        .tier-Down .tier-title { color: #888888; }
        .tier-UNC-GOD .tier-title { color: #ff00ff; }
        .tier-UNC-Hacker .tier-title { color: #aa00ff; }
        .tier-Unranked .tier-title { color: #444444; }

        .tier-players {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tier-player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .tier-player-card:hover {
            transform: translateY(-5px);
            border-color: #2a7dd9;
            background: rgba(42, 125, 217, 0.1);
        }

        .tier-player-avatar {
            width: 50px;
            height: 50px;
            image-rendering: pixelated;
            border-radius: 5px;
            border: 2px solid #2a7dd9;
        }

        .player-info { flex: 1; }
        .player-info-name { font-weight: bold; font-size: 1.1em; }
        .player-info-score { font-size: 0.8em; color: #888; }

        .tier-badge {
            background: #2a7dd9;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: bold;
            cursor: pointer;
        }

        .delete-tier-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #cc3333;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: none;
            z-index: 10;
        }

        body.admin-mode .delete-tier-btn { display: block; }

        /* Žebříček */
        .ranking-container { display: none; }
        .ranking-container.active { display: block; }
        .overall-ranking { background: rgba(0, 0, 0, 0.6); border: 2px solid #2a7dd9; border-radius: 10px; padding: 30px; }
        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #2a7dd9;
            cursor: pointer;
            transition: 0.3s;
        }
        .ranking-item:hover { transform: scale(1.02); background: rgba(0, 0, 0, 0.6); }

        /* Modály */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 999; display: none;
        }
        .modal-backdrop.active { display: block; }

        .profile-modal, .edit-tier-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid #2a7dd9; padding: 30px;
            z-index: 1000; display: none; border-radius: 15px; flex-direction: column; gap: 20px;
            min-width: 350px;
        }
        .profile-modal.active, .edit-tier-modal.active { display: flex; }

        .admin-login { position: fixed; bottom: 10px; left: 10px; font-size: 0.8em; color: #666; cursor: pointer; opacity: 0.4; }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="window.toggleDarkMode()">🌙 / ☀️</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (minecraft nick)">
            <button class="btn btn-primary" onclick="window.addPlayer()">Přidat hráče</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>

        <div class="ranking-container" id="rankingContainer">
            <div class="overall-ranking" id="overallRanking"></div>
        </div>

        <div class="tierlist-container" id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="window.closeModal()"></div>
    
    <div class="profile-modal" id="profileModal">
        <h2 id="profileName" style="color:#2a7dd9; text-align:center;"></h2>
        <div id="profilePoints" style="text-align:center; font-size:1.2em; margin-bottom:10px;"></div>
        <div id="profileTiers" style="display:flex; flex-direction:column; gap:8px;"></div>
        <button class="btn btn-danger" onclick="window.closeModal()">Zavřít</button>
    </div>

    <div class="edit-tier-modal" id="editModal">
        <h3 style="text-align:center;">Upravit Tier</h3>
        <select id="editTierSelect" style="padding:10px; background:#222; color:white; border:1px solid #2a7dd9;">
            <option value="God">God</option><option value="Hacker">Hacker</option><option value="Pro">Pro</option>
            <option value="Normal">Normal</option><option value="Noob">Noob</option><option value="Down">Down</option>
            <option value="UNC GOD">UNC GOD</option><option value="UNC Hacker">UNC Hacker</option><option value="Unranked">Unranked</option>
        </select>
        <button class="btn btn-primary" onclick="window.saveEditModal()">Uložit změny</button>
        <button class="btn btn-danger" onclick="window.closeModal()">Zrušit</button>
    </div>

    <div class="admin-login" onclick="window.requireAdmin()">Admin login</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUIlqycMT_3vhN-MHwfSC2nl_fkxDnsRY",
            authDomain: "tierlist-360c8.firebaseapp.com",
            projectId: "tierlist-360c8",
            storageBucket: "tierlist-360c8.firebasestorage.app",
            messagingSenderId: "634800924408",
            appId: "1:634800924408:web:55ee22f866330a2630fd0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playersRef = ref(db, 'players');

        // Globální stav
        let players = [];
        let currentKit = 'Overall';
        let isAdmin = false;
        let editingPlayerId = null;
        let editingKitName = null;

        const ALL_KITS = [
            { name: 'Overall', icon: '🏆' }, { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' }, { name: 'Elytri', icon: '🔱' }, { name: 'Prasečí jízda', icon: '🐷' }
        ];

        const TIER_POINTS = { 'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5, 'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0 };
        const TIER_LABELS = { 'God':'GOD','Hacker':'HCKR','Pro':'PRO','Normal':'NRML','Noob':'NOOB','Down':'DOWN','UNC GOD':'UGOD','UNC Hacker':'UHCK','Unranked':'URK' };

        // --- FIREBASE NAČÍTÁNÍ ---
        onValue(playersRef, (snapshot) => {
            const data = snapshot.val();
            players = data ? Object.values(data) : [];
            render();
        });

        // --- GLOBÁLNÍ FUNKCE (PŘÍSTUPNÉ Z HTML) ---
        window.requireAdmin = function() {
            if (isAdmin) return true;
            if (prompt("Zadej heslo:") === "zombie1302") {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                return true;
            }
            return false;
        };

        window.addPlayer = function() {
            if (!window.requireAdmin()) return;
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const newPlayer = {
                id: Date.now(),
                name: name,
                kits: { 'Pickaxe':'Unranked', 'PoorSMP':'Unranked', 'Elytri':'Unranked', 'Prasečí jízda':'Unranked' }
            };
            players.push(newPlayer);
            set(playersRef, players);
            document.getElementById('playerNameInput').value = '';
        };

        window.deletePlayer = function(id) {
            if (!window.requireAdmin()) return;
            if (confirm("Opravdu smazat?")) {
                players = players.filter(p => p.id !== id);
                set(playersRef, players);
            }
        };

        window.openProfileModal = function(id) {
            const p = players.find(x => x.id === id);
            document.getElementById('profileName').textContent = p.name;
            document.getElementById('profilePoints').textContent = `Body: ${calculatePoints(p)}`;
            
            const tiersDiv = document.getElementById('profileTiers');
            tiersDiv.innerHTML = '';
            Object.entries(p.kits).forEach(([kit, tier]) => {
                const item = document.createElement('div');
                item.style.display = 'flex'; item.style.justifyContent = 'space-between';
                item.innerHTML = `<span>${kit}:</span> <b style="color:#2a7dd9">${tier}</b>`;
                tiersDiv.appendChild(item);
            });

            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.openEditModal = function(id, kit) {
            if (!window.requireAdmin()) return;
            editingPlayerId = id;
            editingKitName = kit;
            const p = players.find(x => x.id === id);
            document.getElementById('editTierSelect').value = p.kits[kit] || 'Unranked';
            document.getElementById('editModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.saveEditModal = function() {
            const p = players.find(x => x.id === editingPlayerId);
            p.kits[editingKitName] = document.getElementById('editTierSelect').value;
            set(playersRef, players);
            window.closeModal();
        };

        window.closeModal = () => {
            document.querySelectorAll('.profile-modal, .edit-tier-modal, .modal-backdrop').forEach(el => el.classList.remove('active'));
        };

        window.toggleDarkMode = () => {
            document.body.classList.toggle('light-mode');
        };

        function calculatePoints(p) {
            return Object.values(p.kits).reduce((s, t) => s + (TIER_POINTS[t] || 0), 0);
        }

        // --- RENDER LOGIKA ---
        function render() {
            const tabs = document.getElementById('kitTabs');
            tabs.innerHTML = '';
            ALL_KITS.forEach(k => {
                const btn = document.createElement('div');
                btn.className = `kit-tab ${k.name === currentKit ? 'active' : ''}`;
                btn.innerHTML = `${k.icon} ${k.name}`;
                btn.onclick = () => { currentKit = k.name; render(); };
                tabs.appendChild(btn);
            });

            if (currentKit === 'Overall') {
                renderOverall();
            } else {
                renderTierlist();
            }
        }

        function renderOverall() {
            document.getElementById('rankingContainer').style.display = 'block';
            document.getElementById('tierlistContainer').style.display = 'none';
            const cont = document.getElementById('overallRanking');
            cont.innerHTML = '<h2 style="margin-bottom:20px; text-align:center;">🏆 Celkový Žebříček</h2>';
            
            const sorted = [...players].sort((a,b) => calculatePoints(b) - calculatePoints(a));
            sorted.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'ranking-item';
                div.onclick = () => window.openProfileModal(p.id);
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span style="font-size:1.5em; font-weight:bold;">#${i+1}</span>
                        <img src="https://mc-heads.net/avatar/${p.name}/40" style="border-radius:4px;">
                        <strong>${p.name}</strong>
                    </div>
                    <span style="color:#2a7dd9; font-weight:bold;">${calculatePoints(p)} bodů</span>
                `;
                cont.appendChild(div);
            });
        }

        function renderTierlist() {
            document.getElementById('rankingContainer').style.display = 'none';
            document.getElementById('tierlistContainer').style.display = 'block';
            const cont = document.getElementById('tierlistContainer');
            cont.innerHTML = '';
            
            const tiers = ['God','Hacker','Pro','Normal','Noob','Down','UNC GOD','UNC Hacker','Unranked'];
            tiers.forEach(t => {
                const list = players.filter(p => p.kits[currentKit] === t);
                if (list.length === 0 && t !== 'Unranked') return;

                const sec = document.createElement('div');
                sec.className = `tier-section tier-${t.replace(/\s+/g, '-')}`;
                sec.innerHTML = `<div class="tier-header"><div class="tier-line"></div><div class="tier-title">${t}</div><div class="tier-line"></div></div>`;
                
                const grid = document.createElement('div');
                grid.className = 'tier-players';
                list.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'tier-player-card';
                    card.innerHTML = `
                        <button class="delete-tier-btn" onclick="window.deletePlayer(${p.id})">×</button>
                        <img src="https://mc-heads.net/avatar/${p.name}/50" class="tier-player-avatar">
                        <div class="player-info" onclick="window.openProfileModal(${p.id})">
                            <div class="player-info-name">${p.name}</div>
                            <div class="player-info-score">Body: ${TIER_POINTS[t]}</div>
                        </div>
                        <div class="tier-badge" onclick="window.openEditModal(${p.id}, '${currentKit}')">${TIER_LABELS[t] || t}</div>`;
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                cont.appendChild(sec);
            });
        }
    </script>
</body>
</html>
