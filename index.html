<script>
    // ADMIN SYSTÉM (HASH VERZE)
    const ADMIN_HASH = "6f4b5a4c8e3e7f0a6b9f0d4d9b1d6a91d7a9b7e2f4c6e1a2b3c4d5e6f7a8b9c0";
    let isAdmin = false;

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer))
            .map(b => b.toString(16).padStart(2, '0'))
            .join('');
    }

    async function requireAdmin() {
        if (isAdmin) return true;

        const pwd = prompt("Zadej admin heslo:");
        if (pwd === null) return false;

        const hashed = await hashPassword(pwd);

        if (hashed === ADMIN_HASH) {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            alert("Admin mód aktivní.");
            return true;
        } else {
            alert("Špatné heslo.");
            return false;
        }
    }

    const ALL_KITS = [
        { name: 'Overall', icon: '🏆' },
        { name: 'Pickaxe', icon: '⛏️' },
        { name: 'PoorSMP', icon: '🦃' },
        { name: 'Elytri', icon: '🔱' },
        { name: 'Prasečí jízda', icon: '🐷' }
    ];
    
    const ALL_TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'UNC GOD', 'UNC Hacker', 'Unranked'];
    const MC_HEADS_URL = 'https://mc-heads.net/avatar/';
    const MC_BODY_URL = 'https://mc-heads.net/body/';

    const KIT_EMOJIS = {
        'Pickaxe': '⛏️',
        'PoorSMP': '🦃',
        'Elytri': '🔱',
        'Prasečí jízda': '🐷'
    };

    const TIER_LABELS = {
        'God': 'GOD',
        'Hacker': 'HCKR',
        'Pro': 'PRO',
        'Normal': 'NRML',
        'Noob': 'NOOB',
        'Down': 'DOWN',
        'UNC GOD': 'UGOD',
        'UNC Hacker': 'UHCK',
        'Unranked': 'URK'
    };

    const TIER_COLORS = {
        'God': '#ff3333',
        'Hacker': '#ff8800',
        'Pro': '#2a9eff',
        'Normal': '#66aaff',
        'Noob': '#44dd44',
        'Down': '#555555',
        'UNC GOD': '#ff3366',
        'UNC Hacker': '#9955ff',
        'Unranked': '#444'
    };

    const TIER_POINTS = {
        'God': 35,
        'Hacker': 20,
        'Pro': 10,
        'Normal': 5,
        'Noob': 3,
        'Down': 1,
        'UNC GOD': 32,
        'UNC Hacker': 18,
        'Unranked': 0
    };

    let currentKit = 'Overall';
    let editingPlayerId = null;
    let editingKit = null;
    let searchQuery = '';

    function toggleDarkMode() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('light-mode'));
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('light-mode');
        }
    }

    function loadPlayers() {
        try {
            return JSON.parse(localStorage.getItem('tier_players') || '[]');
        } catch (e) {
            return [];
        }
    }

    function savePlayers(players) {
        localStorage.setItem('tier_players', JSON.stringify(players));
    }

    function getTierPoints(tier) {
        return TIER_POINTS[tier] || 0;
    }

    function computeOverallPoints(player) {
        let total = 0;
        ALL_KITS.forEach(kit => {
            if (kit.name !== 'Overall' && player.kits && player.kits[kit.name]) {
                total += getTierPoints(player.kits[kit.name]);
            }
        });
        return total;
    }

    function getSortedPlayersByPoints() {
        const players = loadPlayers();
        return [...players].sort((a, b) => {
            const pointsA = computeOverallPoints(a);
            const pointsB = computeOverallPoints(b);
            return pointsB - pointsA;
        });
    }

    async function addPlayer() {
        if (!(await requireAdmin())) return;

        const input = document.getElementById('playerNameInput');
        const name = input.value.trim();
        
        if (!name) {
            alert('Zadej jméno hráče!');
            return;
        }

        const players = loadPlayers();
        
        if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
            alert('Tento hráč už existuje!');
            return;
        }

        const newPlayer = {
            id: Date.now(),
            name: name,
            kits: {}
        };

        ALL_KITS.forEach(kit => {
            if (kit.name !== 'Overall') {
                newPlayer.kits[kit.name] = 'Unranked';
            }
        });

        players.push(newPlayer);
        savePlayers(players);
        input.value = '';
        render();
    }

    async function deletePlayer(id) {
        if (!(await requireAdmin())) return;

        if (confirm('Opravdu smazat tohoto hráče?')) {
            let players = loadPlayers();
            players = players.filter(p => p.id !== id);
            savePlayers(players);
            render();
        }
    }

    function openProfileModal(playerId) {
        const sortedPlayers = getSortedPlayersByPoints();
        const players = loadPlayers();
        const player = players.find(p => p.id === playerId);
        const position = sortedPlayers.findIndex(p => p.id === playerId) + 1;

        if (player) {
            const tierPoints = computeOverallPoints(player);
            document.getElementById('profileName').textContent = player.name;
            document.getElementById('profileRank').textContent = `#${position} v Overall žebříčku`;
            document.getElementById('profileAvatar').src = `${MC_BODY_URL}${player.name}/200.png?size=200`;
            document.getElementById('profilePoints').textContent = tierPoints;
            document.getElementById('profilePosition').textContent = `#${position}`;

            let tiersHTML = '';
            ALL_KITS.forEach(kit => {
                if (kit.name !== 'Overall') {
                    const tier = player.kits[kit.name] || 'Unranked';
                    if (tier !== 'Unranked') {
                        const emoji = KIT_EMOJIS[kit.name];
                        const label = TIER_LABELS[tier];
                        tiersHTML += `
                            <div class="profile-tier-item">
                                <div class="profile-tier-emoji">${emoji}</div>
                                <div class="profile-tier-label">${label}</div>
                            </div>
                        `;
                    }
                }
            });

            document.getElementById('profileTiers').innerHTML = tiersHTML;
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }
    }

    function closeModal() {
        document.getElementById('profileModal').classList.remove('active');
        document.getElementById('editModal').classList.remove('active');
        document.getElementById('modalBackdrop').classList.remove('active');
        editingPlayerId = null;
        editingKit = null;
    }

    async function openEditModal(playerId, kit) {
        if (!(await requireAdmin())) return;

        editingPlayerId = playerId;
        editingKit = kit;
        const players = loadPlayers();
        const player = players.find(p => p.id === playerId);
        if (player) {
            const currentTier = player.kits[kit] || 'Unranked';
            document.getElementById('editTierSelect').value = currentTier;
            document.getElementById('profileModal').classList.remove('active');
            document.getElementById('editModal').classList.add('active');
        }
    }

    async function saveEditModal() {
        if (!(await requireAdmin())) return;
        if (!editingPlayerId || !editingKit) return;

        const newTier = document.getElementById('editTierSelect').value;
        const players = loadPlayers();
        const player = players.find(p => p.id === editingPlayerId);
        if (player) {
            player.kits[editingKit] = newTier;
            savePlayers(players);
            render();
            closeModal();
        }
    }

    function renderOverallRanking() {
        const sortedPlayers = getSortedPlayersByPoints();
        const rankingDiv = document.getElementById('overallRanking');
        
        rankingDiv.innerHTML = `
            <h2>Žebříček - Overall</h2>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="🔍 Hledej hráče..."
                    onkeyup="handleSearch(this.value)"
                >
            </div>
        `;

        const filteredPlayers = searchQuery 
            ? sortedPlayers.filter(p => p.name.toLowerCase().includes(searchQuery))
            : sortedPlayers;

        if (filteredPlayers.length === 0) {
            rankingDiv.innerHTML += '<div class="empty-message">Žádní hráči. Přidej si někoho!</div>';
            return;
        }

        filteredPlayers.forEach((player, index) => {
            const tierPoints = computeOverallPoints(player);
            const item = document.createElement('div');
            item.className = 'ranking-item';
            
            if (index === 0) item.classList.add('rank-1');
            else if (index === 1) item.classList.add('rank-2');
            else if (index === 2) item.classList.add('rank-3');
            else item.classList.add('rank-other');
            
            let tierBadgesHTML = '';
            ALL_KITS.forEach(kit => {
                if (kit.name !== 'Overall') {
                    const tier = player.kits[kit.name] || 'Unranked';
                    if (tier === 'Unranked') return;
                    
                    const kitEmoji = KIT_EMOJIS[kit.name] || '❓';
                    const tierLabel = TIER_LABELS[tier];
                    const points = getTierPoints(tier);
                    const tierColor = TIER_COLORS[tier];
                    
                    tierBadgesHTML += `
                        <div class="tier-icon-badge" style="border-color: ${tierColor};">
                            <div class="tier-emoji">${kitEmoji}</div>
                            <div class="tier-icon-label" style="background: ${tierColor};">${tierLabel}</div>
                            <div class="tier-tooltip">${kit.name} - ${tier} (${points} bodů)</div>
                        </div>
                    `;
                }
            });
            
            item.innerHTML = `
                <div class="ranking-left">
                    <div class="ranking-number">#${index + 1}</div>
                    <img src="${MC_HEADS_URL}${player.name}/64.png?size=64" class="ranking-avatar">
                    <div class="ranking-info">
                        <div class="ranking-name">${player.name}</div>
                        <div class="ranking-points">${tierPoints} Bodů</div>
                    </div>
                </div>
                <div class="tier-badges-wrapper">
                    ${tierBadgesHTML}
                </div>
            `;
            
            item.onclick = () => openProfileModal(player.id);
            rankingDiv.appendChild(item);
        });
    }

    function handleSearch(query) {
        searchQuery = query.toLowerCase();
        renderOverallRanking();
    }

    function render() {
        const sortedPlayers = getSortedPlayersByPoints();

        const kitTabsContainer = document.getElementById('kitTabs');
        kitTabsContainer.innerHTML = '';
        ALL_KITS.forEach(kit => {
            const tab = document.createElement('div');
            tab.className = `kit-tab ${kit.name === currentKit ? 'active' : ''}`;
            tab.innerHTML = `<span class="kit-icon">${kit.icon}</span> ${kit.name}`;
            tab.onclick = () => {
                currentKit = kit.name;
                searchQuery = '';
                render();
            };
            kitTabsContainer.appendChild(tab);
        });

        if (currentKit === 'Overall') {
            document.getElementById('rankingContainer').classList.add('active');
            document.getElementById('tierlistContainer').classList.remove('active');
            renderOverallRanking();
        } else {
            document.getElementById('rankingContainer').classList.remove('active');
            document.getElementById('tierlistContainer').classList.add('active');

            const tierlistDiv = document.getElementById('tierlistContainer');
            tierlistDiv.innerHTML = '';

            if (sortedPlayers.length === 0) {
                tierlistDiv.innerHTML = '<div class="empty-message">Žádní hráči.</div>';
                return;
            }

            const tierGroups = {};
            ALL_TIERS.forEach(tier => {
                tierGroups[tier] = sortedPlayers.filter(p => p.kits[currentKit] === tier);
            });

            ALL_TIERS.forEach(tier => {
                const tierPlayers = tierGroups[tier];
                if (tierPlayers.length === 0) return;

                const section = document.createElement('div');
                section.className = `tier-section tier-${tier.replace(/\s+/g, '-')}`;

                section.innerHTML = `
                    <div class="tier-header">
                        <div class="tier-line"></div>
                        <div class="tier-title">${tier}</div>
                        <div class="tier-line"></div>
                    </div>
                `;

                const playersDiv = document.createElement('div');
                playersDiv.className = 'tier-players';

                tierPlayers.forEach(player => {
                    const card = document.createElement('div');
                    card.className = `tier-player-card`;

                    card.innerHTML = `
                        <button class="delete-tier-btn">×</button>
                        <img src="${MC_HEADS_URL}${player.name}/64.png?size=64" class="tier-player-avatar">
                        <div class="player-info">
                            <div class="player-info-name">${player.name}</div>
                            <div class="player-info-score">${getTierPoints(tier)} bodů</div>
                        </div>
                        <div class="tier-badge">${TIER_LABELS[tier]}</div>
                    `;

                    card.onclick = () => openProfileModal(player.id);

                    card.querySelector('.delete-tier-btn').onclick = (e) => {
                        e.stopPropagation();
                        deletePlayer(player.id);
                    };

                    card.querySelector('.tier-badge').onclick = (e) => {
                        e.stopPropagation();
                        openEditModal(player.id, currentKit);
                    };

                    playersDiv.appendChild(card);
                });

                section.appendChild(playersDiv);
                tierlistDiv.appendChild(section);
            });
        }
    }

    loadDarkMode();
    render();
</script>
