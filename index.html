<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff; padding: 20px; min-height: 100vh; transition: background 0.3s;
        }
        body.light-mode { background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        h1 { text-align: center; font-size: 3em; color: #2a7dd9; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); font-weight: bold; flex: 1; }
        .dark-mode-toggle { background: #2a7dd9; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 1.2em; }
        .admin-panel {
            background: rgba(0, 0, 0, 0.6); border: 2px solid #2a7dd9; border-radius: 10px; padding: 20px;
            margin-bottom: 30px; display: none; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        body.admin-mode .admin-panel { display: flex; }
        .admin-panel input { padding: 12px 15px; border: 2px solid #2a7dd9; border-radius: 5px; background: rgba(0,0,0,0.7); color: #fff; flex: 1; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #2a7dd9; color: #fff; }
        .btn-danger { background: #cc3333; color: #fff; }
        
        /* TABS & TIERS */
        .kit-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .kit-tab { padding: 12px 25px; border: 2px solid #1a1a1a; background: rgba(0,0,0,0.5); color: #888; border-radius: 25px; cursor: pointer; }
        .kit-tab.active { background: #ffa500; color: #000; border-color: #ffa500; }
        
        .tier-section { margin-bottom: 40px; }
        .tier-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .tier-line { flex: 1; height: 1px; background: #444; }
        .tier-title { font-size: 1.3em; font-weight: bold; min-width: 150px; text-align: center; }
        .tier-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .tier-player-card { background: rgba(0, 0, 0, 0.5); border: 2px solid #1a1a1a; border-radius: 10px; padding: 15px; position: relative; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .tier-player-avatar { width: 50px; height: 50px; border-radius: 5px; border: 2px solid #2a7dd9; }
        .tier-badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: bold; }
        
        /* MODAL */
        .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .modal-backdrop.active { display: block; }
        .profile-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid #2a7dd9; border-radius: 15px; padding: 30px; z-index: 1000; display: none; flex-direction: column; min-width: 400px; }
        .profile-modal.active { display: flex; }
        
        /* ADMIN LOGIN HIDDEN */
        .admin-login { position: fixed; bottom: 10px; left: 10px; font-size: 0.8em; color: #666; cursor: pointer; opacity: 0.3; }
        .delete-tier-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: none; }
        body.admin-mode .delete-tier-btn { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>

        <div class="admin-panel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
            <button class="btn" style="background-color: #28a745; color: white;" onclick="saveToCloud()">💾 Uložit pro všechny</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>
        <div id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    <div class="profile-modal" id="profileModal">
        <h2 id="profileName"></h2>
        <img id="profileAvatar" src="" style="width: 100px; margin: 10px auto;">
        <button class="btn btn-danger" onclick="closeModal()">Zavřít</button>
    </div>

    <div class="admin-login" onclick="requireAdmin()">Admin login</div>

    <script>
        // --- KONFIGURACE ---
        const ADMIN_PASSWORD = "UxzPO)P8Q<F";
        const DATABASE_URL = "https://tierlist-360c8-default-rtdb.europe-west1.firebasedatabase.app/players.json";
        let isAdmin = false;
        let currentKit = 'Pickaxe';

        const ALL_KITS = [
            { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' },
            { name: 'Elytri', icon: '🔱' },
            { name: 'Prasečí jízda', icon: '🐷' }
        ];
        const ALL_TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'Unranked'];

        // --- FUNKCE PRO UKLÁDÁNÍ (FIREBASE) ---
        async function saveToCloud() {
            if (!requireAdmin()) return;
            
            const players = loadPlayers();
            const btn = document.querySelector('button[onclick="saveToCloud()"]');
            btn.textContent = "⏳ Ukládám...";
            btn.disabled = true;

            try {
                // Pošleme data na tvůj Firebase
                const response = await fetch(DATABASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(players)
                });

                if (response.ok) {
                    alert("✅ Úspěšně uloženo! Teď to uvidí všichni.");
                } else {
                    alert("❌ Chyba při ukládání na server.");
                }
            } catch (e) {
                alert("❌ Nepodařilo se připojit k internetu/Firebase.");
            } finally {
                btn.textContent = "💾 Uložit pro všechny";
                btn.disabled = false;
            }
        }

        // --- FUNKCE PRO NAČÍTÁNÍ (FIREBASE) ---
        async function loadFromCloud() {
            try {
                const response = await fetch(DATABASE_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data) {
                        savePlayers(data); // Uložíme do lokální paměti
                    }
                }
            } catch (e) {
                console.log("Pracuji offline.");
            }
            render();
        }

        // --- ZBYTEK LOGIKY ---
        function requireAdmin() {
            if (isAdmin) return true;
            const pwd = prompt("Zadej admin heslo:");
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                return true;
            }
            return false;
        }

        function loadPlayers() { return JSON.parse(localStorage.getItem('tier_players') || '[]'); }
        function savePlayers(players) { localStorage.setItem('tier_players', JSON.stringify(players)); }

        function addPlayer() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            let players = loadPlayers();
            players.push({ id: Date.now(), name: name, kits: { 'Pickaxe': 'Unranked' } });
            savePlayers(players);
            render();
        }

        function deletePlayer(id) {
            let players = loadPlayers().filter(p => p.id !== id);
            savePlayers(players);
            render();
        }

        function toggleDarkMode() { document.body.classList.toggle('light-mode'); }

        function render() {
            const players = loadPlayers();
            const container = document.getElementById('tierlistContainer');
            container.innerHTML = '';

            const tabs = document.getElementById('kitTabs');
            tabs.innerHTML = '';
            ALL_KITS.forEach(kit => {
                tabs.innerHTML += `<div class="kit-tab ${kit.name === currentKit ? 'active' : ''}" onclick="currentKit='${kit.name}'; render();">${kit.icon} ${kit.name}</div>`;
            });

            ALL_TIERS.forEach(tier => {
                const tierPlayers = players.filter(p => (p.kits[currentKit] || 'Unranked') === tier);
                if (tierPlayers.length === 0) return;

                let html = `<div class="tier-section">
                    <div class="tier-header"><div class="tier-line"></div><div class="tier-title">${tier}</div><div class="tier-line"></div></div>
                    <div class="tier-players">`;
                
                tierPlayers.forEach(p => {
                    html += `<div class="tier-player-card">
                        <button class="delete-tier-btn" onclick="deletePlayer(${p.id})">×</button>
                        <img src="https://mc-heads.net/avatar/${p.name}" class="tier-player-avatar">
                        <div>${p.name}</div>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function closeModal() { document.getElementById('profileModal').classList.remove('active'); document.getElementById('modalBackdrop').classList.remove('active'); }

        // Spuštění
        loadFromCloud();
    </script>
</body>
</html>
