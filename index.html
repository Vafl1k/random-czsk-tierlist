<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #2a7dd9;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-weight: bold;
            flex: 1;
        }

        .dark-mode-toggle {
            background: #2a7dd9;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(42, 125, 217, 0.3);
        }

        .dark-mode-toggle:hover {
            background: #3a8de9;
            transform: translateY(-2px);
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        body.admin-mode .admin-panel {
            display: flex;
        }

        .admin-panel input {
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1em;
            flex: 1;
            min-width: 200px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #2a7dd9;
            color: #fff;
        }

        .btn-primary:hover {
            background: #3a8de9;
            box-shadow: 0 0 15px rgba(42, 125, 217, 0.5);
        }

        .btn-save-all {
            background: #28a745;
            color: #fff;
        }

        .btn-save-all:hover {
            background: #218838;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.5);
        }

        .kit-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kit-tab {
            padding: 12px 25px;
            border: 2px solid #1a1a1a;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .kit-tab:hover {
            border-color: #2a7dd9;
            color: #fff;
        }

        .kit-tab.active {
            background: #ffa500;
            color: #000;
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
        }

        .tier-section {
            margin-bottom: 40px;
        }

        .tier-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .tier-line {
            flex: 1;
            height: 1px;
            background: #444;
        }

        .tier-title {
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 150px;
            text-align: center;
        }

        /* Tier Colors */
        .tier-God .tier-title { color: #ff3333; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #66aaff; }
        .tier-Noob .tier-title { color: #44dd44; }
        .tier-Down .tier-title { color: #555555; }
        .tier-UNC-GOD .tier-title { color: #ff3366; }
        .tier-UNC-Hacker .tier-title { color: #9955ff; }

        .tier-players {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .tier-player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tier-player-card:hover {
            transform: translateY(-5px);
            border-color: #2a7dd9;
            background: rgba(42, 125, 217, 0.1);
        }

        .tier-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            border: 2px solid #333;
        }

        .player-info {
            flex: 1;
        }

        .player-info-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 2px;
        }

        .player-info-score {
            font-size: 0.8em;
            color: #888;
        }

        .tier-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Badge Styles */
        .tier-God .tier-badge { background: #ff3333; color: #fff; }
        .tier-Hacker .tier-badge { background: #ff8800; color: #fff; }
        .tier-Pro .tier-badge { background: #2a9eff; color: #fff; }
        .tier-Normal .tier-badge { background: #66aaff; color: #000; }
        .tier-Noob .tier-badge { background: #44dd44; color: #000; }
        .tier-Down .tier-badge { background: #555555; color: #fff; }
        .tier-UNC-GOD .tier-badge { background: #ff3366; color: #fff; }
        .tier-UNC-Hacker .tier-badge { background: #9955ff; color: #fff; }

        .delete-tier-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        body.admin-mode .delete-tier-btn {
            display: flex;
        }

        /* Overall Ranking */
        .overall-ranking {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #2a7dd9;
            box-shadow: 0 0 30px rgba(42, 125, 217, 0.1);
        }

        .search-box {
            margin-bottom: 25px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #2a7dd9;
            box-shadow: 0 0 15px rgba(42, 125, 217, 0.3);
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-left-color: #2a7dd9;
            transform: translateX(5px);
        }

        .ranking-number {
            font-size: 1.8em;
            font-weight: bold;
            width: 60px;
            color: #ffa500;
            font-style: italic;
        }

        .ranking-avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-right: 20px;
            border: 2px solid #333;
        }

        .ranking-name {
            font-size: 1.3em;
            font-weight: bold;
            flex: 1;
        }

        .ranking-points {
            font-size: 1.1em;
            font-weight: bold;
            color: #2a7dd9;
            background: rgba(42, 125, 217, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }

        .modal-backdrop.active {
            display: block;
        }

        .profile-modal, .edit-tier-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0d0d0d;
            border: 2px solid #2a7dd9;
            border-radius: 20px;
            padding: 40px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            min-width: 450px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .profile-modal.active, .edit-tier-modal.active {
            display: flex;
        }

        .profile-avatar-large {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            border: 4px solid #2a7dd9;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(42, 125, 217, 0.3);
        }

        .profile-stats {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.1em; font-weight: bold; }

        .admin-login {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8em;
            color: #444;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .admin-login:hover {
            opacity: 1;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #2a7dd9;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 / ☀️</button>
        </div>

        <div class="admin-panel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (Minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
            <button class="btn btn-save-all" onclick="saveAllToCloud()">💾 Uložit pro všechny</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>

        <div id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    
    <div class="profile-modal" id="profileModal">
        <img id="modalAvatar" src="" class="profile-avatar-large">
        <h2 id="modalName" style="font-size: 2.5em; margin-bottom: 5px;"></h2>
        <div id="modalScore" style="color: #2a7dd9; font-weight: bold; margin-bottom: 20px;"></div>
        
        <div class="profile-stats" id="modalStats"></div>
        
        <button class="btn btn-primary" style="width: 100%;" onclick="closeModal()">Zavřít profil</button>
    </div>

    <div class="edit-tier-modal" id="editModal">
        <h2 style="margin-bottom: 20px;">Upravit Tier</h2>
        <p id="editPlayerName" style="margin-bottom: 15px; color: #888;"></p>
        <select id="tierSelect">
            <option value="God">God</option>
            <option value="Hacker">Hacker</option>
            <option value="Pro">Pro</option>
            <option value="Normal">Normal</option>
            <option value="Noob">Noob</option>
            <option value="Down">Down</option>
            <option value="UNC GOD">UNC GOD</option>
            <option value="UNC Hacker">UNC Hacker</option>
            <option value="Unranked">Unranked</option>
        </select>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn btn-primary" style="flex: 1;" onclick="saveEditModal()">Uložit</button>
            <button class="btn" style="flex: 1; background: #333; color: #fff;" onclick="closeModal()">Zrušit</button>
        </div>
    </div>

    <div class="admin-login" onclick="requireAdmin()">Admin login</div>

    <script>
        // --- KONFIGURACE (TVŮJ FIREBASE) ---
        const ADMIN_PASSWORD = "UxzPO)P8Q<F";
        const DATABASE_URL = "https://tierlist-360c8-default-rtdb.europe-west1.firebasedatabase.app/players.json";
        const MC_HEADS_URL = "https://mc-heads.net/avatar/";
        
        let isAdmin = false;
        let currentKit = 'Overall';
        let searchQuery = '';
        let editingPlayerId = null;

        const ALL_KITS = [
            { name: 'Overall', icon: '🏆' },
            { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' },
            { name: 'Elytri', icon: '🔱' },
            { name: 'Prasečí jízda', icon: '🐷' }
        ];

        const TIER_POINTS = {
            'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5,
            'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0
        };

        const TIER_LABELS = {
            'God': 'God', 'Hacker': 'Hacker', 'Pro': 'Pro', 'Normal': 'Normal',
            'Noob': 'Noob', 'Down': 'Down', 'UNC GOD': 'UNC GOD', 'UNC Hacker': 'UNC Hacker', 'Unranked': 'Unranked'
        };

        const ALL_TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'UNC GOD', 'UNC Hacker', 'Unranked'];

        // --- SYNCHRONIZACE S FIREBASE ---
        async function saveAllToCloud() {
            if (!requireAdmin()) return;
            const players = loadPlayers();
            const btn = document.querySelector('.btn-save-all');
            const originalText = btn.textContent;
            btn.textContent = "⌛ Ukládám...";
            btn.disabled = true;

            try {
                // Posíláme data přímo na Firebase
                const response = await fetch(DATABASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(players)
                });

                if (response.ok) {
                    alert("✅ Úspěšně uloženo pro všechny!");
                } else {
                    alert("❌ Chyba při ukládání na Firebase.");
                }
            } catch (e) {
                console.error(e);
                alert("❌ Nepodařilo se připojit k Firebase.");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function loadGlobalData() {
            try {
                const response = await fetch(DATABASE_URL);
                if (response.ok) {
                    const serverData = await response.json();
                    if (serverData) {
                        savePlayers(serverData);
                    }
                }
            } catch (e) {
                console.log("Offline mode - používám lokální data.");
            }
            render();
        }

        // --- ZÁKLADNÍ FUNKCE ---
        function loadPlayers() { return JSON.parse(localStorage.getItem('tier_players') || '[]'); }
        function savePlayers(players) { localStorage.setItem('tier_players', JSON.stringify(players)); }

        function requireAdmin() {
            if (isAdmin) return true;
            const pwd = prompt("Zadej administrátorské heslo:");
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                render();
                return true;
            }
            return false;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('tier_dark_mode', document.body.classList.contains('light-mode'));
        }

        function loadDarkMode() {
            if (localStorage.getItem('tier_dark_mode') === 'true') document.body.classList.add('light-mode');
        }

        function getTierPoints(tier) { return TIER_POINTS[tier] || 0; }

        function getPlayerTotalScore(player) {
            let total = 0;
            Object.values(player.kits || {}).forEach(t => total += getTierPoints(t));
            return total;
        }

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            if (!name) return;
            let players = loadPlayers();
            players.push({ id: Date.now(), name: name, kits: {} });
            savePlayers(players);
            input.value = '';
            render();
        }

        function deletePlayer(id) {
            if (!requireAdmin()) return;
            let players = loadPlayers().filter(p => p.id !== id);
            savePlayers(players);
            render();
        }

        // --- MODAL LOGIKA ---
        function openProfileModal(id) {
            const player = loadPlayers().find(p => p.id === id);
            if (!player) return;

            document.getElementById('modalAvatar').src = `${MC_HEADS_URL}${player.name}/128.png`;
            document.getElementById('modalName').textContent = player.name;
            document.getElementById('modalScore').textContent = `CELKOVÉ SKÓRE: ${getPlayerTotalScore(player)} B`;

            const statsDiv = document.getElementById('modalStats');
            statsDiv.innerHTML = '';
            ALL_KITS.filter(k => k.name !== 'Overall').forEach(kit => {
                const tier = player.kits[kit.name] || 'Unranked';
                statsDiv.innerHTML += `
                    <div class="stat-card">
                        <div class="stat-label">${kit.icon} ${kit.name}</div>
                        <div class="stat-value" style="color:${getTierColor(tier)}">${tier}</div>
                    </div>`;
            });

            document.getElementById('modalBackdrop').classList.add('active');
            document.getElementById('profileModal').classList.add('active');
        }

        function openEditModal(id, kit) {
            if (!requireAdmin()) return;
            editingPlayerId = id;
            currentKit = kit;
            const player = loadPlayers().find(p => p.id === id);
            document.getElementById('editPlayerName').textContent = `Hráč: ${player.name} | Kit: ${kit}`;
            document.getElementById('tierSelect').value = player.kits[kit] || 'Unranked';
            document.getElementById('modalBackdrop').classList.add('active');
            document.getElementById('editModal').classList.add('active');
        }

        function saveEditModal() {
            const newTier = document.getElementById('tierSelect').value;
            let players = loadPlayers();
            let p = players.find(x => x.id === editingPlayerId);
            if (p) {
                p.kits[currentKit] = newTier;
                savePlayers(players);
            }
            closeModal();
            render();
        }

        function closeModal() {
            document.querySelectorAll('.profile-modal, .edit-tier-modal, .modal-backdrop').forEach(el => el.classList.remove('active'));
        }

        function getTierColor(tier) {
            if (tier === 'God') return '#ff3333';
            if (tier === 'Hacker') return '#ff8800';
            if (tier === 'Pro') return '#2a9eff';
            if (tier === 'Normal') return '#66aaff';
            if (tier === 'Noob') return '#44dd44';
            if (tier === 'UNC GOD') return '#ff3366';
            if (tier === 'UNC Hacker') return '#9955ff';
            return '#888';
        }

        // --- RENDERING ---
        function render() {
            const players = loadPlayers();
            const container = document.getElementById('tierlistContainer');
            container.innerHTML = '';

            const tabs = document.getElementById('kitTabs');
            tabs.innerHTML = '';
            ALL_KITS.forEach(k => {
                const tab = document.createElement('div');
                tab.className = `kit-tab ${k.name === currentKit ? 'active' : ''}`;
                tab.innerHTML = `${k.icon} ${k.name}`;
                tab.onclick = () => { currentKit = k.name; render(); };
                tabs.appendChild(tab);
            });

            if (currentKit === 'Overall') {
                renderOverallRanking(players, container);
            } else {
                renderTierlist(players, container);
            }
        }

        function renderOverallRanking(players, container) {
            const sortedPlayers = [...players].sort((a, b) => getPlayerTotalScore(b) - getPlayerTotalScore(a));
            
            let html = `
                <div class="overall-ranking">
                    <div class="search-box">
                        <input type="text" placeholder="Hledej hráče..." onkeyup="searchQuery = this.value.toLowerCase(); render();" value="${searchQuery}">
                    </div>
            `;

            sortedPlayers.filter(p => p.name.toLowerCase().includes(searchQuery)).forEach((p, i) => {
                html += `
                    <div class="ranking-item" onclick="openProfileModal(${p.id})">
                        <div class="ranking-number">#${i + 1}</div>
                        <img src="${MC_HEADS_URL}${p.name}/64.png" class="ranking-avatar">
                        <div class="ranking-name">${p.name}</div>
                        <div class="ranking-points">${getPlayerTotalScore(p)} bodů</div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function renderTierlist(players, container) {
            ALL_TIERS.forEach(tier => {
                const tierPlayers = players.filter(p => (p.kits[currentKit] || 'Unranked') === tier);
                if (tierPlayers.length === 0 && tier === 'Unranked') return;

                const section = document.createElement('div');
                section.className = `tier-section tier-${tier.replace(/\s+/g, '-')}`;
                
                section.innerHTML = `
                    <div class="tier-header">
                        <div class="tier-line"></div>
                        <div class="tier-title">${tier}</div>
                        <div class="tier-line"></div>
                    </div>
                `;

                const playersDiv = document.createElement('div');
                playersDiv.className = 'tier-players';

                tierPlayers.forEach(player => {
                    const playerCard = document.createElement('div');
                    playerCard.className = 'tier-player-card';
                    playerCard.innerHTML = `
                        <button class="delete-tier-btn" onclick="deletePlayer(${player.id}); event.stopPropagation();">×</button>
                        <img src="${MC_HEADS_URL}${player.name}/64.png" class="tier-player-avatar">
                        <div class="player-info">
                            <div class="player-info-name">${player.name}</div>
                            <div class="player-info-score">Skóre: ${getTierPoints(tier)}</div>
                        </div>
                        <div class="tier-badge" onclick="openEditModal(${player.id}, '${currentKit}')">${tier}</div>
                    `;
                    playerCard.onclick = (e) => {
                        if (e.target.classList.contains('delete-tier-btn') || e.target.classList.contains('tier-badge')) return;
                        openProfileModal(player.id);
                    };
                    playersDiv.appendChild(playerCard);
                });

                section.appendChild(playersDiv);
                container.appendChild(section);
            });
        }

        // Start
        loadDarkMode();
        loadGlobalData();
    </script>
</body>
</html>
