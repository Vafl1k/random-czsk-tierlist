<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #2a7dd9;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-weight: bold;
            flex: 1;
        }

        .dark-mode-toggle {
            background: #2a7dd9;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .dark-mode-toggle:hover {
            background: #4a9eff;
            transform: scale(1.05);
        }

        body.light-mode .dark-mode-toggle {
            background: #333;
        }

        body.light-mode .dark-mode-toggle:hover {
            background: #555;
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        body.light-mode .admin-panel {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
        }

        body.admin-mode .admin-panel {
            display: flex;
        }

        .admin-panel input {
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1em;
            flex: 1;
            min-width: 250px;
            transition: all 0.3s;
        }

        body.light-mode .admin-panel input {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 2px solid #333;
        }

        .admin-panel input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        body.light-mode .admin-panel input::placeholder {
            color: rgba(0,0,0,0.4);
        }

        .admin-panel input:focus {
            outline: none;
            border-color: #4a9eff;
            transform: scale(1.02);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2a7dd9;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4a9eff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(42, 125, 217, 0.6);
        }

        .btn-danger {
            background: #cc3333;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff5555;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.5);
        }

        .kit-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kit-tab {
            padding: 12px 25px;
            border: 2px solid #1a1a1a;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        body.light-mode .kit-tab {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #333;
            color: #555;
        }

        .kit-tab.active {
            background: #ffa500;
            color: #000;
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
        }

        .kit-tab:hover {
            border-color: #ffa500;
            color: #ffa500;
            transform: translateY(-2px);
        }

        .kit-icon {
            font-size: 1.2em;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .tierlist-container { display: none; }
        .tierlist-container.active { display: block; animation: fadeIn 0.3s ease-out; }

        .tier-section { margin-bottom: 40px; animation: slideIn 0.3s ease-out; }

        .tier-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .tier-line { flex: 1; height: 1px; background: #444; }
        body.light-mode .tier-line { background: #ccc; }

        .tier-title {
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 150px;
            text-align: center;
        }

        .tier-God .tier-title { color: #ff3333; }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #66aaff; }
        .tier-Noob .tier-title { color: #44dd44; }
        .tier-Down .tier-title { color: #555555; }
        .tier-UNC\ GOD .tier-title { color: #ff3366; }
        .tier-UNC\ Hacker .tier-title { color: #9955ff; }

        .tier-players {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tier-player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            animation: slideIn 0.3s ease-out;
        }

        body.light-mode .tier-player-card {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #ddd;
        }

        .tier-player-card:hover {
            border-color: #2a7dd9;
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(42, 125, 217, 0.3);
        }

        .tier-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            pointer-events: none;
        }

        body.admin-mode .tier-badge {
            pointer-events: auto;
            cursor: pointer;
        }

        .tier-God .tier-badge { background: #ff3333; color: #fff; }
        .tier-Hacker .tier-badge { background: #ff8800; color: #fff; }
        .tier-Pro .tier-badge { background: #2a9eff; color: #fff; }
        .tier-Normal .tier-badge { background: #66aaff; color: #000; }
        .tier-Noob .tier-badge { background: #44dd44; color: #000; }
        .tier-Down .tier-badge { background: #555555; color: #fff; }
        .tier-UNC\ GOD .tier-badge { background: #ff3366; color: #fff; }
        .tier-UNC\ Hacker .tier-badge { background: #9955ff; color: #fff; }

        .player-info { flex: 1; }
        .player-info-name { font-weight: bold; color: #2a7dd9; margin-bottom: 3px; }
        body.light-mode .player-info-name { color: #333; }
        .player-info-score { font-size: 0.8em; color: #999; }
        body.light-mode .player-info-score { color: #666; }

        .tier-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            border: 2px solid #2a7dd9;
            flex-shrink: 0;
            object-fit: cover;
            background: #0a0a0a;
            transition: transform 0.3s;
        }

        .delete-tier-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #cc3333;
            border: none;
            color: #fff;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s;
            opacity: 0;
            display: none;
        }

        body.admin-mode .tier-player-card:hover .delete-tier-btn {
            opacity: 1;
            display: block;
        }

        .ranking-container { display: none; }
        .ranking-container.active { display: block; animation: fadeIn 0.3s ease-out; }

        .overall-ranking {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .search-box {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #2a7dd9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 1em;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #2a7dd9;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ranking-number {
            font-size: 2em;
            font-weight: bold;
            min-width: 90px;
            text-align: center;
            padding: 20px 25px;
            border-radius: 15px;
        }

        .rank-1 .ranking-number { background: #FFD700 !important; color: #000; }
        .rank-2 .ranking-number { background: #C0C0C0 !important; color: #000; }
        .rank-3 .ranking-number { background: #CD7F32 !important; color: #fff; }

        .tier-icon-badge {
            width: 50px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid #2a7dd9;
            position: relative;
        }

        .tier-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            padding: 8px 12px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .tier-icon-badge:hover .tier-tooltip { opacity: 1; visibility: visible; }

        .profile-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.98);
            border: 3px solid #2a7dd9;
            border-radius: 15px;
            padding: 40px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 20px;
            min-width: 600px;
        }

        .profile-modal.active { display: flex; }

        .edit-tier-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.98);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 30px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .edit-tier-modal.active { display: flex; }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }

        .modal-backdrop.active { display: block; }

        .admin-login {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8em;
            color: #666;
            cursor: pointer;
            opacity: 0.4;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>

        <div class="admin-panel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
            <button class="btn" style="background-color: #28a745; color: white;" onclick="saveToCloud()">💾 Uložit pro všechny</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>

        <div class="ranking-container" id="rankingContainer">
            <div class="overall-ranking" id="overallRanking"></div>
        </div>

        <div class="tierlist-container" id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    
    <div class="profile-modal" id="profileModal">
        <h2 id="profileName"></h2>
        <img id="profileAvatar" src="" style="width:100px; height:100px;">
        <div id="profileRank"></div>
        <div id="profilePoints"></div>
        <div id="profilePosition"></div>
        <div id="profileTiers"></div>
        <button onclick="closeModal()">Zavřít</button>
    </div>

    <div class="edit-tier-modal" id="editModal">
        <select id="editTierSelect">
            <option value="God">God</option>
            <option value="Hacker">Hacker</option>
            <option value="Pro">Pro</option>
            <option value="Normal">Normal</option>
            <option value="Noob">Noob</option>
            <option value="Down">Down</option>
            <option value="UNC GOD">UNC GOD</option>
            <option value="UNC Hacker">UNC Hacker</option>
            <option value="Unranked">Unranked</option>
        </select>
        <button class="btn btn-primary" onclick="saveEditModal()">Uložit</button>
        <button class="btn btn-danger" onclick="closeModal()">Zrušit</button>
    </div>

    <div class="admin-login" onclick="requireAdmin()">Admin login</div>

    <script>
        const ADMIN_PASSWORD = "UxzPO)P8Q<F";
        // TVŮJ FIREBASE ODKAZ
        const DATABASE_URL = "https://tierlist-360c8-default-rtdb.europe-west1.firebasedatabase.app/players.json";
        let isAdmin = false;

        function requireAdmin() {
            if (isAdmin) return true;
            const pwd = prompt("Zadej admin heslo:");
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                return true;
            }
            return false;
        }

        const ALL_KITS = [
            { name: 'Overall', icon: '🏆' },
            { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' },
            { name: 'Elytri', icon: '🔱' },
            { name: 'Prasečí jízda', icon: '🐷' }
        ];
        
        const ALL_TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'UNC GOD', 'UNC Hacker', 'Unranked'];
        const MC_HEADS_URL = 'https://mc-heads.net/avatar/';
        const TIER_LABELS = { 'God': 'GOD', 'Hacker': 'HCKR', 'Pro': 'PRO', 'Normal': 'NRML', 'Noob': 'NOOB', 'Down': 'DOWN', 'UNC GOD': 'UGOD', 'UNC Hacker': 'UHCK', 'Unranked': 'URK' };
        const TIER_COLORS = { 'God': '#ff3333', 'Hacker': '#ff8800', 'Pro': '#2a9eff', 'Normal': '#66aaff', 'Noob': '#44dd44', 'Down': '#555555', 'UNC GOD': '#ff3366', 'UNC Hacker': '#9955ff', 'Unranked': '#444' };
        const TIER_POINTS = { 'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5, 'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0 };
        const KIT_EMOJIS = { 'Pickaxe': '⛏️', 'PoorSMP': '🦃', 'Elytri': '🔱', 'Prasečí jízda': '🐷' };

        let currentKit = 'Overall';
        let editingPlayerId = null;
        let editingKit = null;
        let searchQuery = '';

        function toggleDarkMode() { document.body.classList.toggle('light-mode'); }
        function loadPlayers() { return JSON.parse(localStorage.getItem('tier_players') || '[]'); }
        function savePlayers(players) { localStorage.setItem('tier_players', JSON.stringify(players)); }
        function getTierPoints(tier) { return TIER_POINTS[tier] || 0; }

        function computeOverallPoints(player) {
            let total = 0;
            ALL_KITS.forEach(kit => {
                if (kit.name !== 'Overall' && player.kits && player.kits[kit.name]) {
                    total += getTierPoints(player.kits[kit.name]);
                }
            });
            return total;
        }

        function addPlayer() {
            if (!requireAdmin()) return;
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const players = loadPlayers();
            const newPlayer = { id: Date.now(), name: name, kits: {} };
            ALL_KITS.forEach(kit => { if (kit.name !== 'Overall') newPlayer.kits[kit.name] = 'Unranked'; });
            players.push(newPlayer);
            savePlayers(players);
            render();
        }

        function deletePlayer(id) {
            if (!requireAdmin() || !confirm('Smazat?')) return;
            savePlayers(loadPlayers().filter(p => p.id !== id));
            render();
        }

        function openEditModal(playerId, kit) {
            if (!requireAdmin()) return;
            editingPlayerId = playerId; editingKit = kit;
            const p = loadPlayers().find(x => x.id === playerId);
            document.getElementById('editTierSelect').value = p.kits[kit] || 'Unranked';
            document.getElementById('editModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }

        function saveEditModal() {
            const players = loadPlayers();
            const p = players.find(x => x.id === editingPlayerId);
            p.kits[editingKit] = document.getElementById('editTierSelect').value;
            savePlayers(players); closeModal(); render();
        }

        function closeModal() {
            document.getElementById('profileModal').classList.remove('active');
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('modalBackdrop').classList.remove('active');
        }

        // --- FIREBASE FUNKCE ---
        async function saveToCloud() {
            if (!requireAdmin()) return;
            const btn = document.querySelector('button[onclick="saveToCloud()"]');
            btn.textContent = "⌛ Ukládám...";
            try {
                // Přímý zápis do Firebase přes PUT
                await fetch(DATABASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(loadPlayers())
                });
                alert("✅ Uloženo do databáze!");
            } catch (e) { alert("❌ Chyba!"); }
            btn.textContent = "💾 Uložit pro všechny";
        }

        async function loadGlobalData() {
            try {
                const response = await fetch(DATABASE_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data) savePlayers(data);
                }
            } catch (e) {}
            render();
        }

        function renderOverallRanking() {
            const sorted = [...loadPlayers()].sort((a,b) => computeOverallPoints(b) - computeOverallPoints(a));
            const div = document.getElementById('overallRanking');
            div.innerHTML = '<h2>Žebříček - Overall</h2><div class="search-box"><input type="text" placeholder="Hledej..." onkeyup="searchQuery=this.value.toLowerCase(); renderOverallRanking();"></div>';
            sorted.filter(p => p.name.toLowerCase().includes(searchQuery)).forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'ranking-item rank-' + (i < 3 ? i+1 : 'other');
                item.innerHTML = `<div class="ranking-number">#${i+1}</div><img src="${MC_HEADS_URL}${p.name}/64.png" class="ranking-avatar"><div>${p.name} - ${computeOverallPoints(p)} Bodů</div>`;
                div.appendChild(item);
            });
        }

        function render() {
            const players = loadPlayers();
            const tabs = document.getElementById('kitTabs');
            tabs.innerHTML = '';
            ALL_KITS.forEach(k => {
                const t = document.createElement('div');
                t.className = `kit-tab ${k.name === currentKit ? 'active' : ''}`;
                t.innerHTML = `${k.icon} ${k.name}`;
                t.onclick = () => { currentKit = k.name; render(); };
                tabs.appendChild(t);
            });

            if (currentKit === 'Overall') {
                document.getElementById('rankingContainer').classList.add('active');
                document.getElementById('tierlistContainer').classList.remove('active');
                renderOverallRanking();
            } else {
                document.getElementById('rankingContainer').classList.remove('active');
                document.getElementById('tierlistContainer').classList.add('active');
                const cont = document.getElementById('tierlistContainer');
                cont.innerHTML = '';
                ALL_TIERS.forEach(tier => {
                    const tierPlayers = players.filter(p => p.kits[currentKit] === tier);
                    if (tierPlayers.length === 0) return;
                    const sec = document.createElement('div');
                    sec.className = `tier-section tier-${tier.replace(/\s+/g, '-')}`;
                    sec.innerHTML = `<div class="tier-header"><div class="tier-line"></div><div class="tier-title">${tier}</div><div class="tier-line"></div></div>`;
                    const pDiv = document.createElement('div'); pDiv.className = 'tier-players';
                    tierPlayers.forEach(p => {
                        const card = document.createElement('div');
                        card.className = 'tier-player-card';
                        card.innerHTML = `<button class="delete-tier-btn" onclick="deletePlayer(${p.id})">×</button>
                            <img src="${MC_HEADS_URL}${p.name}/64.png" class="tier-player-avatar">
                            <div class="player-info"><div class="player-info-name">${p.name}</div><div class="player-info-score">Skóre: ${getTierPoints(tier)}</div></div>
                            <div class="tier-badge" onclick="openEditModal(${p.id}, '${currentKit}')">${TIER_LABELS[tier]}</div>`;
                        pDiv.appendChild(card);
                    });
                    sec.appendChild(pDiv); cont.appendChild(sec);
                });
            }
        }

        loadGlobalData();
    </script>
</body>
</html>
