<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        /* TVŮJ KOMPLETNÍ DESIGN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #2a7dd9;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-weight: bold;
            flex: 1;
        }

        .dark-mode-toggle {
            background: #2a7dd9;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        body.admin-mode .admin-panel {
            display: flex;
        }

        .admin-panel input {
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1em;
            flex: 1;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2a7dd9;
            color: #fff;
        }

        .btn-save-all {
            background: #28a745;
            color: #fff;
        }

        .kit-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kit-tab {
            padding: 12px 25px;
            border: 2px solid #1a1a1a;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .kit-tab.active {
            background: #ffa500;
            color: #000;
            border-color: #ffa500;
        }

        .tier-section {
            margin-bottom: 40px;
        }

        .tier-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .tier-line {
            flex: 1;
            height: 1px;
            background: #444;
        }

        .tier-title {
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            min-width: 150px;
            text-align: center;
        }

        /* Barvy Tierů */
        .tier-God .tier-title { color: #ff3333; }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #66aaff; }
        .tier-Noob .tier-title { color: #44dd44; }
        .tier-Down .tier-title { color: #555555; }
        .tier-UNC-GOD .tier-title { color: #ff3366; }
        .tier-UNC-Hacker .tier-title { color: #9955ff; }

        .tier-players {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tier-player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tier-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 5px;
        }

        .tier-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: bold;
            margin-left: auto;
        }

        /* Badge barvy */
        .tier-God .tier-badge { background: #ff3333; color: #fff; }
        .tier-Hacker .tier-badge { background: #ff8800; color: #fff; }
        .tier-Pro .tier-badge { background: #2a9eff; color: #fff; }
        .tier-Normal .tier-badge { background: #66aaff; color: #000; }
        .tier-Noob .tier-badge { background: #44dd44; color: #000; }
        .tier-Down .tier-badge { background: #555555; color: #fff; }
        .tier-UNC-GOD .tier-badge { background: #ff3366; color: #fff; }
        .tier-UNC-Hacker .tier-badge { background: #9955ff; color: #fff; }

        .search-box {
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1em;
        }

        .overall-ranking {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #2a7dd9;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .ranking-number {
            font-size: 1.8em;
            font-weight: bold;
            width: 60px;
            color: #ffa500;
        }

        .ranking-avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-right: 20px;
        }

        .admin-login {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8em;
            color: #444;
            cursor: pointer;
            opacity: 0.3;
        }

        .delete-tier-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        body.admin-mode .delete-tier-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            display: none;
        }

        .modal-backdrop.active {
            display: block;
        }

        .profile-modal, .edit-tier-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0d0d0d;
            border: 2px solid #2a7dd9;
            border-radius: 20px;
            padding: 40px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            min-width: 400px;
        }

        .profile-modal.active, .edit-tier-modal.active {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 / ☀️</button>
        </div>

        <div class="admin-panel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (Minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
            <button class="btn btn-save-all" onclick="saveAllToCloud()">💾 Uložit pro všechny</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>

        <div id="mainContent"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    
    <div class="profile-modal" id="profileModal">
        <img id="modalAvatar" src="" style="width:100px; height:100px; border-radius:10px; border:3px solid #2a7dd9; margin-bottom:15px;">
        <h2 id="modalName" style="margin-bottom:10px;"></h2>
        <div id="modalStats" style="width:100%; margin-bottom:20px;"></div>
        <button class="btn btn-primary" style="width:100%" onclick="closeModal()">Zavřít</button>
    </div>

    <div class="edit-tier-modal" id="editModal">
        <h2 style="margin-bottom:20px;">Změnit Tier</h2>
        <select id="tierSelect" style="width:100%; padding:12px; background:#1a1a1a; color:#fff; border:2px solid #2a7dd9; border-radius:8px; margin-bottom:20px;">
            <option value="God">God</option>
            <option value="Hacker">Hacker</option>
            <option value="Pro">Pro</option>
            <option value="Normal">Normal</option>
            <option value="Noob">Noob</option>
            <option value="Down">Down</option>
            <option value="UNC GOD">UNC GOD</option>
            <option value="UNC Hacker">UNC Hacker</option>
            <option value="Unranked">Unranked</option>
        </select>
        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn btn-primary" style="flex:1" onclick="saveEditModal()">Uložit</button>
            <button class="btn" style="flex:1; background:#333; color:#fff;" onclick="closeModal()">Zrušit</button>
        </div>
    </div>

    <div class="admin-login" onclick="requireAdmin()">Admin login</div>

    <script>
        // --- KONFIGURACE FIREBASE ---
        const ADMIN_PASSWORD = "UxzPO)P8Q<F";
        const DATABASE_URL = "https://tierlist-360c8-default-rtdb.europe-west1.firebasedatabase.app/players.json";
        
        let isAdmin = false;
        let currentKit = 'Overall';
        let searchQuery = '';
        let editingPlayerId = null;

        const ALL_KITS = [
            { name: 'Overall', icon: '🏆' },
            { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' },
            { name: 'Elytri', icon: '🔱' },
            { name: 'Prasečí jízda', icon: '🐷' }
        ];

        const TIER_POINTS = { 
            'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5, 
            'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0 
        };
        const ALL_TIERS = ['God', 'Hacker', 'Pro', 'Normal', 'Noob', 'Down', 'UNC GOD', 'UNC Hacker', 'Unranked'];

        // --- FIREBASE SYNC ---
        async function saveAllToCloud() {
            if (!requireAdmin()) return;
            const players = loadPlayers();
            const btn = document.querySelector('.btn-save-all');
            btn.textContent = "⌛ Ukládám...";
            try {
                const response = await fetch(DATABASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(players)
                });
                if (response.ok) alert("✅ Úspěšně uloženo pro všechny!");
            } catch (e) { alert("❌ Chyba při ukládání."); }
            btn.textContent = "💾 Uložit pro všechny";
        }

        async function loadGlobalData() {
            try {
                const response = await fetch(DATABASE_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data) localStorage.setItem('tier_players', JSON.stringify(data));
                }
            } catch (e) {}
            render();
        }

        // --- LOGIKA ---
        function loadPlayers() { return JSON.parse(localStorage.getItem('tier_players') || '[]'); }
        function savePlayers(players) { localStorage.setItem('tier_players', JSON.stringify(players)); }

        function requireAdmin() {
            if (isAdmin) return true;
            const pwd = prompt("Admin heslo:");
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                render();
                return true;
            }
            return false;
        }

        function toggleDarkMode() { document.body.classList.toggle('light-mode'); }

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            if (!input.value.trim()) return;
            let players = loadPlayers();
            players.push({ id: Date.now(), name: input.value.trim(), kits: {} });
            savePlayers(players);
            input.value = '';
            render();
        }

        function deletePlayer(id) {
            if (!requireAdmin()) return;
            let players = loadPlayers().filter(p => p.id !== id);
            savePlayers(players);
            render();
        }

        function openEditModal(id) {
            if (!requireAdmin()) return;
            editingPlayerId = id;
            document.getElementById('editModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }

        function saveEditModal() {
            const newTier = document.getElementById('tierSelect').value;
            let players = loadPlayers();
            let p = players.find(x => x.id === editingPlayerId);
            if (p) { p.kits[currentKit] = newTier; savePlayers(players); }
            closeModal();
            render();
        }

        function openProfileModal(id) {
            const player = loadPlayers().find(p => p.id === id);
            if (!player) return;
            document.getElementById('modalAvatar').src = `https://mc-heads.net/avatar/${player.name}/100.png`;
            document.getElementById('modalName').textContent = player.name;
            let statsHtml = '';
            ALL_KITS.filter(k => k.name !== 'Overall').forEach(k => {
                statsHtml += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333;">
                    <span>${k.icon} ${k.name}:</span> 
                    <span style="font-weight:bold; color:#2a7dd9">${player.kits[k.name] || 'Unranked'}</span>
                </div>`;
            });
            document.getElementById('modalStats').innerHTML = statsHtml;
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }

        function closeModal() {
            document.querySelectorAll('.profile-modal, .edit-tier-modal, .modal-backdrop').forEach(m => m.classList.remove('active'));
        }

        // --- RENDERING ---
        function render() {
            const players = loadPlayers();
            const content = document.getElementById('mainContent');
            content.innerHTML = '';

            const tabs = document.getElementById('kitTabs');
            tabs.innerHTML = '';
            ALL_KITS.forEach(k => {
                tabs.innerHTML += `<div class="kit-tab ${k.name === currentKit ? 'active' : ''}" onclick="currentKit='${k.name}'; render();">${k.icon} ${k.name}</div>`;
            });

            if (currentKit === 'Overall') {
                const sorted = [...players].sort((a, b) => {
                    let ptsA = 0; Object.values(a.kits).forEach(v => ptsA += TIER_POINTS[v] || 0);
                    let ptsB = 0; Object.values(b.kits).forEach(v => ptsB += TIER_POINTS[v] || 0);
                    return ptsB - ptsA;
                });
                let html = `<div class="search-box"><input type="text" placeholder="Hledej hráče..." onkeyup="searchQuery=this.value.toLowerCase(); render();" value="${searchQuery}"></div>`;
                html += `<div class="overall-ranking">`;
                sorted.filter(p => p.name.toLowerCase().includes(searchQuery)).forEach((p, i) => {
                    let pts = 0; Object.values(p.kits).forEach(v => pts += TIER_POINTS[v] || 0);
                    html += `<div class="ranking-item" onclick="openProfileModal(${p.id})">
                        <div class="ranking-number">#${i+1}</div>
                        <img src="https://mc-heads.net/avatar/${p.name}" class="ranking-avatar">
                        <div style="flex:1; font-weight:bold; font-size:1.2em;">${p.name}</div>
                        <div style="font-weight:bold; color:#2a7dd9; background:rgba(42,125,217,0.1); padding:5px 15px; border-radius:20px;">${pts} bodů</div>
                    </div>`;
                });
                html += `</div>`;
                content.innerHTML = html;
            } else {
                ALL_TIERS.forEach(tier => {
                    const tierPlayers = players.filter(p => (p.kits[currentKit] || 'Unranked') === tier);
                    if (tierPlayers.length === 0) return;
                    let tierHtml = `<div class="tier-section tier-${tier.replace(/\s+/g, '-')}">
                        <div class="tier-header"><div class="tier-line"></div><div class="tier-title">${tier}</div><div class="tier-line"></div></div>
                        <div class="tier-players">`;
                    tierPlayers.forEach(p => {
                        tierHtml += `<div class="tier-player-card" onclick="openProfileModal(${p.id})">
                            <button class="delete-tier-btn" onclick="deletePlayer(${p.id}); event.stopPropagation();">×</button>
                            <img src="https://mc-heads.net/avatar/${p.name}" class="tier-player-avatar">
                            <strong>${p.name}</strong>
                            <div class="tier-badge" onclick="event.stopPropagation(); openEditModal(${p.id})">${tier}</div>
                        </div>`;
                    });
                    tierHtml += `</div></div>`;
                    content.innerHTML += tierHtml;
                });
            }
        }

        loadGlobalData();
    </script>
</body>
</html>
