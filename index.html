<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random CZ/SK Tierlist</title>
    <style>
        /* Tady jsou tvé kompletní styly přesně podle originálu */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #2a7dd9;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-weight: bold;
            flex: 1;
        }

        .dark-mode-toggle {
            background: #2a7dd9;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .dark-mode-toggle:hover {
            background: #4a9eff;
            transform: scale(1.05);
        }

        body.light-mode .dark-mode-toggle {
            background: #333;
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #2a7dd9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none; 
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        body.admin-mode .admin-panel {
            display: flex;
        }

        .admin-panel input {
            padding: 12px 15px;
            border: 2px solid #2a7dd9;
            border-radius: 5px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1em;
            flex: 1;
            min-width: 250px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary { background: #2a7dd9; color: #fff; }
        .btn-danger { background: #cc3333; color: #fff; }

        .kit-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kit-tab {
            padding: 12px 25px;
            border: 2px solid #1a1a1a;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kit-tab.active {
            background: #ffa500;
            color: #000;
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
        }

        /* Sekce Tierů */
        .tier-section { margin-bottom: 40px; }
        .tier-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .tier-line { flex: 1; height: 1px; background: #444; }
        .tier-title { font-size: 1.3em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; min-width: 150px; text-align: center; }

        .tier-God .tier-title { color: #ff3333; }
        .tier-Hacker .tier-title { color: #ff8800; }
        .tier-Pro .tier-title { color: #2a9eff; }
        .tier-Normal .tier-title { color: #66aaff; }
        .tier-Noob .tier-title { color: #44dd44; }
        .tier-Down .tier-title { color: #555555; }
        .tier-UNC\ GOD .tier-title { color: #ff3366; }
        .tier-UNC\ Hacker .tier-title { color: #9955ff; }

        .tier-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .tier-player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .tier-player-card:hover { transform: translateY(-5px); border-color: #2a7dd9; }

        .tier-badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: bold; pointer-events: none; }
        body.admin-mode .tier-badge { pointer-events: auto; cursor: pointer; }

        .tier-God .tier-badge { background: #ff3333; color: #fff; }
        .tier-Hacker .tier-badge { background: #ff8800; color: #fff; }
        .tier-Pro .tier-badge { background: #2a9eff; color: #fff; }

        /* Žebříček s tvojí speciální Top 3 grafikou */
        .ranking-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 8px; margin-bottom: 15px;
            border-left: 4px solid #2a7dd9; transition: 0.3s; cursor: pointer;
        }

        .ranking-number {
            font-size: 2em; font-weight: bold; min-width: 90px; text-align: center;
            padding: 20px 25px; border-radius: 15px; display: flex; align-items: center; justify-content: center;
        }

        .rank-1 .ranking-number { background: #FFD700 !important; color: #000; box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        .rank-2 .ranking-number { background: #C0C0C0 !important; color: #000; box-shadow: 0 0 25px rgba(192, 192, 192, 0.7); }
        .rank-3 .ranking-number { background: #CD7F32 !important; color: #fff; box-shadow: 0 0 25px rgba(205, 127, 50, 0.7); }

        .tier-icon-badge {
            width: 50px; height: 60px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; border-radius: 8px; border: 2px solid #2a7dd9; position: relative;
        }

        .tier-tooltip {
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.95); border: 2px solid #2a7dd9; padding: 8px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 10;
        }

        .tier-icon-badge:hover .tier-tooltip { visibility: visible; opacity: 1; }

        /* Profily a Modály */
        .profile-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.98); border: 3px solid #2a7dd9; border-radius: 15px;
            padding: 40px; z-index: 1000; display: none; min-width: 600px;
        }
        .profile-modal.active { display: flex; flex-direction: column; }
        .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .modal-backdrop.active { display: block; }

        .admin-login { position: fixed; bottom: 10px; left: 10px; font-size: 0.8em; color: #666; cursor: pointer; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Random CZ/SK Tierlist</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <input type="text" id="playerNameInput" placeholder="Jméno hráče (minecraft nick)">
            <button class="btn btn-primary" onclick="addPlayer()">Přidat hráče</button>
        </div>

        <div class="kit-tabs" id="kitTabs"></div>

        <div class="ranking-container" id="rankingContainer">
            <div class="overall-ranking" id="overallRanking"></div>
        </div>

        <div class="tierlist-container" id="tierlistContainer"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
    
    <div class="profile-modal" id="profileModal">
        <div id="profileContent">
            <div class="profile-modal-header" style="display:flex; gap:30px; border-bottom:3px solid #2a7dd9; padding-bottom:20px;">
                <img id="profileAvatar" src="" class="profile-modal-avatar" style="width:160px; height:220px; border:3px solid #2a7dd9; object-fit:contain; background:#000;">
                <div class="profile-modal-info">
                    <h2 id="profileName" style="color:#2a7dd9; font-size:2em;"></h2>
                    <div id="profileRank" style="color:#ffa500; font-weight:bold;"></div>
                    <div style="display:flex; gap:15px; margin-top:20px;">
                        <div class="stat-box" style="background:rgba(42,125,217,0.2); padding:15px; border-radius:8px; text-align:center; flex:1;">
                            <div style="font-size:0.9em; color:#aaa;">Body</div>
                            <div id="profilePoints" style="font-size:1.5em; font-weight:bold; color:#2a7dd9;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div style="margin-top:20px;">
                <div style="color:#aaa; margin-bottom:10px;">Tiery:</div>
                <div id="profileTiers" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
            </div>
        </div>
        <button class="btn btn-danger" onclick="closeModal()" style="margin-top:20px; align-self:flex-end;">Zavřít</button>
    </div>

    <div class="edit-tier-modal" id="editModal" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; border:2px solid #2a7dd9; padding:30px; z-index:1000; display:none; flex-direction:column; gap:15px;">
        <label>Vyber nový tier:</label>
        <select id="editTierSelect" style="padding:10px; background:#000; color:white; border:1px solid #2a7dd9;">
            <option value="God">God</option><option value="Hacker">Hacker</option><option value="Pro">Pro</option>
            <option value="Normal">Normal</option><option value="Noob">Noob</option><option value="Down">Down</option>
            <option value="UNC GOD">UNC GOD</option><option value="UNC Hacker">UNC Hacker</option><option value="Unranked">Unranked</option>
        </select>
        <button class="btn btn-primary" onclick="saveEditModal()">Uložit</button>
        <button class="btn btn-danger" onclick="closeModal()">Zrušit</button>
    </div>

    <div class="admin-login" onclick="requireAdmin()">Admin login</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUIlqycMT_3vhN-MHwfSC2nl_fkxDnsRY",
            authDomain: "tierlist-360c8.firebaseapp.com",
            projectId: "tierlist-360c8",
            storageBucket: "tierlist-360c8.firebasestorage.app",
            messagingSenderId: "634800924408",
            appId: "1:634800924408:web:55ee22f866330a2630fd0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playersRef = ref(db, 'players');

        // TVÉ KONSTANTY Z ORIGINÁLU
        const ALL_KITS = [
            { name: 'Overall', icon: '🏆' }, { name: 'Pickaxe', icon: '⛏️' },
            { name: 'PoorSMP', icon: '🦃' }, { name: 'Elytri', icon: '🔱' }, { name: 'Prasečí jízda', icon: '🐷' }
        ];
        const TIER_POINTS = { 'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5, 'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0 };
        const TIER_LABELS = { 'God':'GOD','Hacker':'HCKR','Pro':'PRO','Normal':'NRML','Noob':'NOOB','Down':'DOWN','UNC GOD':'UGOD','UNC Hacker':'UHCK','Unranked':'URK' };
        const TIER_COLORS = { 'God':'#ff3333','Hacker':'#ff8800','Pro':'#2a9eff','Normal':'#66aaff','Noob':'#44dd44','Down':'#555555','UNC GOD':'#ff3366','UNC Hacker':'#9955ff','Unranked':'#444' };
        const KIT_EMOJIS = { 'Pickaxe':'⛏️','PoorSMP':'🦃','Elytri':'🔱','Prasečí jízda':'🐷' };

        let players = [];
        let currentKit = 'Overall';
        let isAdmin = false;
        let searchQuery = '';
        let editingPlayerId = null;
        let editingKit = null;

        // NAČÍTÁNÍ Z FIREBASE (Místo LocalStorage)
        onValue(playersRef, (snapshot) => {
            const data = snapshot.val();
            players = data ? Object.values(data) : [];
            render();
        });

        // TVÉ FUNKCE PROPOJENÉ S FIREBASE
        window.requireAdmin = () => {
            if (isAdmin) return true;
            if (prompt("Zadej heslo:") === "zombie1302") {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                return true;
            }
            return false;
        };

        window.addPlayer = () => {
            if (!window.requireAdmin()) return;
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const newPlayer = { id: Date.now(), name, kits: { 'Pickaxe':'Unranked', 'PoorSMP':'Unranked', 'Elytri':'Unranked', 'Prasečí jízda':'Unranked' }};
            players.push(newPlayer);
            set(playersRef, players);
            document.getElementById('playerNameInput').value = '';
        };

        window.deletePlayer = (id) => {
            if (!window.requireAdmin() || !confirm("Smazat?")) return;
            players = players.filter(p => p.id !== id);
            set(playersRef, players);
        };

        window.saveEditModal = () => {
            const player = players.find(p => p.id === editingPlayerId);
            if (player) {
                player.kits[editingKit] = document.getElementById('editTierSelect').value;
                set(playersRef, players);
                window.closeModal();
            }
        };

        // --- RENDER LOGIKA (PŘESNĚ PODLE TVÉHO HTML) ---
        function computePoints(p) {
            return Object.values(p.kits).reduce((sum, t) => sum + (TIER_POINTS[t] || 0), 0);
        }

        window.toggleDarkMode = () => document.body.classList.toggle('light-mode');
        window.closeModal = () => {
            document.querySelectorAll('.profile-modal, .modal-backdrop, #editModal').forEach(el => el.classList.remove('active'));
            document.getElementById('editModal').style.display = 'none';
        };

        window.openProfileModal = (id) => {
            const p = players.find(x => x.id === id);
            const sorted = [...players].sort((a,b) => computePoints(b) - computePoints(a));
            const pos = sorted.findIndex(x => x.id === id) + 1;
            
            document.getElementById('profileName').textContent = p.name;
            document.getElementById('profileRank').textContent = `#${pos} v žebříčku`;
            document.getElementById('profilePoints').textContent = computePoints(p);
            document.getElementById('profileAvatar').src = `https://mc-heads.net/body/${p.name}/200.png`;
            
            let html = '';
            Object.entries(p.kits).forEach(([k, t]) => {
                if (t !== 'Unranked') html += `<div class="profile-tier-item" style="background:rgba(42,125,217,0.2); padding:10px; border-radius:8px; text-align:center;"><div style="font-size:1.5em;">${KIT_EMOJIS[k]}</div><div style="font-size:0.7em; font-weight:bold;">${TIER_LABELS[t]}</div></div>`;
            });
            document.getElementById('profileTiers').innerHTML = html;
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.openEditModal = (id, kit) => {
            if (!window.requireAdmin()) return;
            editingPlayerId = id; editingKit = kit;
            const p = players.find(x => x.id === id);
            document.getElementById('editTierSelect').value = p.kits[kit];
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('modalBackdrop').classList.add('active');
        };

        window.handleSearch = (q) => { searchQuery = q.toLowerCase(); renderOverall(); };

        function render() {
            const tabCont = document.getElementById('kitTabs');
            tabCont.innerHTML = '';
            ALL_KITS.forEach(k => {
                const btn = document.createElement('div');
                btn.className = `kit-tab ${k.name === currentKit ? 'active' : ''}`;
                btn.innerHTML = `<span class="kit-icon">${k.icon}</span> ${k.name}`;
                btn.onclick = () => { currentKit = k.name; render(); };
                tabCont.appendChild(btn);
            });

            if (currentKit === 'Overall') {
                renderOverall();
            } else {
                renderTierlist();
            }
        }

        function renderOverall() {
            document.getElementById('rankingContainer').style.display = 'block';
            document.getElementById('tierlistContainer').style.display = 'none';
            const cont = document.getElementById('overallRanking');
            cont.innerHTML = `<h2>Žebříček - Overall</h2><div class="search-box" style="margin-bottom:25px;"><input type="text" placeholder="🔍 Hledej..." onkeyup="handleSearch(this.value)" style="width:100%; padding:12px; background:rgba(0,0,0,0.7); color:white; border:2px solid #2a7dd9; border-radius:5px;"></div>`;
            
            const sorted = [...players].sort((a,b) => computePoints(b) - computePoints(a))
                            .filter(p => p.name.toLowerCase().includes(searchQuery));

            sorted.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = `ranking-item rank-${i < 3 ? i + 1 : 'other'}`;
                item.onclick = () => window.openProfileModal(p.id);
                
                let badges = '';
                Object.entries(p.kits).forEach(([k, t]) => {
                    if (t === 'Unranked') return;
                    const color = TIER_COLORS[t];
                    badges += `<div class="tier-icon-badge" style="border-color:${color};"><div class="tier-emoji">${KIT_EMOJIS[k]}</div><div class="tier-icon-label" style="background:${color};">${TIER_LABELS[t]}</div><div class="tier-tooltip">${k} - ${t}</div></div>`;
                });

                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div class="ranking-number">#${i+1}</div>
                        <img src="https://mc-heads.net/avatar/${p.name}/64" style="width:64px; border-radius:8px; border:2px solid #2a7dd9;">
                        <div><div style="font-weight:bold; color:#2a7dd9;">${p.name}</div><div style="color:#ffa500; font-weight:bold;">${computePoints(p)} Bodů</div></div>
                    </div>
                    <div style="display:flex; gap:10px;">${badges}</div>`;
                cont.appendChild(item);
            });
        }

        function renderTierlist() {
            document.getElementById('rankingContainer').style.display = 'none';
            document.getElementById('tierlistContainer').style.display = 'block';
            const cont = document.getElementById('tierlistContainer');
            cont.innerHTML = '';

            const TIERS = ['God','Hacker','Pro','Normal','Noob','Down','UNC GOD','UNC Hacker','Unranked'];
            TIERS.forEach(t => {
                const list = players.filter(p => p.kits[currentKit] === t);
                if (list.length === 0 && t !== 'Unranked') return;

                const sec = document.createElement('div');
                sec.className = `tier-section tier-${t.replace(/\s+/g, '-')}`;
                sec.innerHTML = `<div class="tier-header"><div class="tier-line"></div><div class="tier-title">${t}</div><div class="tier-line"></div></div>`;
                
                const grid = document.createElement('div');
                grid.className = 'tier-players';
                list.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'tier-player-card';
                    card.innerHTML = `<button class="delete-tier-btn" onclick="deletePlayer(${p.id}); event.stopPropagation();">×</button>
                        <img src="https://mc-heads.net/avatar/${p.name}/64" class="tier-player-avatar" style="width:50px; border-radius:5px; border:2px solid #2a7dd9;">
                        <div style="flex:1;" onclick="openProfileModal(${p.id})"><div style="font-weight:bold; color:#2a7dd9;">${p.name}</div><div style="font-size:0.8em; color:#999;">Skóre: ${TIER_POINTS[t]}</div></div>
                        <div class="tier-badge" onclick="openEditModal(${p.id},'${currentKit}')">${TIER_LABELS[t]}</div>`;
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                cont.appendChild(sec);
            });
        }
    </script>
</body>
</html>
