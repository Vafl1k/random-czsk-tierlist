<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

<script>
// FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyCAy6BvWK7zFmlmbT82gMCifSU5yU8vdPY",
  authDomain: "random-tierlist-b3c6f.firebaseapp.com",
  projectId: "random-tierlist-b3c6f",
  storageBucket: "random-tierlist-b3c6f.firebasestorage.app",
  messagingSenderId: "839770835155",
  appId: "1:839770835155:web:588b17da50a634cdc3ec26",
  measurementId: "G-72E2P7RKGE"
};

firebase.initializeApp(firebaseConfig);
firebase.analytics();
const db = firebase.firestore();
const playersCol = db.collection("tierlist");

// ADMIN
const ADMIN_PASSWORD = "zombie1302";
let isAdmin = false;

function requireAdmin() {
    if (isAdmin) return true;
    const pwd = prompt("Zadej admin heslo:");
    if (pwd === ADMIN_PASSWORD) {
        isAdmin = true;
        document.body.classList.add("admin-mode");
        alert("Admin mód aktivní.");
        return true;
    }
    alert("Špatné heslo.");
    return false;
}

// KONSTANTY
const ALL_KITS = [
    { name: 'Overall', icon: '🏆' },
    { name: 'Pickaxe', icon: '⛏️' },
    { name: 'PoorSMP', icon: '🦃' },
    { name: 'Elytri', icon: '🔱' },
    { name: 'Prasečí jízda', icon: '🐷' }
];

const ALL_TIERS = ['God','Hacker','Pro','Normal','Noob','Down','UNC GOD','UNC Hacker','Unranked'];

const TIER_POINTS = {
    'God': 35, 'Hacker': 20, 'Pro': 10, 'Normal': 5,
    'Noob': 3, 'Down': 1, 'UNC GOD': 32, 'UNC Hacker': 18, 'Unranked': 0
};

const TIER_LABELS = {
    'God':'GOD','Hacker':'HCKR','Pro':'PRO','Normal':'NRML',
    'Noob':'NOOB','Down':'DOWN','UNC GOD':'UGOD','UNC Hacker':'UHCK','Unranked':'URK'
};

const KIT_EMOJIS = {
    'Pickaxe':'⛏️','PoorSMP':'🦃','Elytri':'🔱','Prasečí jízda':'🐷'
};

const MC_HEADS_URL = "https://mc-heads.net/avatar/";
const MC_BODY_URL = "https://mc-heads.net/body/";

let playersCache = [];
let currentKit = "Overall";
let editingPlayerId = null;
let editingKit = null;
let searchQuery = "";

// FIRESTORE LOAD
async function loadPlayers() {
    const snap = await playersCol.get();
    playersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    return playersCache;
}

// FIRESTORE SAVE
async function savePlayer(id, data) {
    return playersCol.doc(id).update(data);
}

// FIRESTORE ADD
async function addPlayer() {
    if (!requireAdmin()) return;

    const input = document.getElementById("playerNameInput");
    const name = input.value.trim();
    if (!name) return alert("Zadej jméno!");

    if (playersCache.some(p => p.name.toLowerCase() === name.toLowerCase()))
        return alert("Hráč už existuje!");

    const kits = {};
    ALL_KITS.forEach(k => { if (k.name !== "Overall") kits[k.name] = "Unranked"; });

    await playersCol.add({ name, kits });
    input.value = "";
    await loadPlayers();
    render();
}

// DELETE PLAYER
async function deletePlayer(id) {
    if (!requireAdmin()) return;
    if (!confirm("Smazat hráče?")) return;

    await playersCol.doc(id).delete();
    await loadPlayers();
    render();
}

// EDIT TIER
function openEditModal(id, kit) {
    if (!requireAdmin()) return;
    editingPlayerId = id;
    editingKit = kit;

    const player = playersCache.find(p => p.id === id);
    document.getElementById("editTierSelect").value = player.kits[kit] || "Unranked";

    document.getElementById("editModal").classList.add("active");
    document.getElementById("modalBackdrop").classList.add("active");
}

async function saveEditModal() {
    if (!editingPlayerId || !editingKit) return;

    const newTier = document.getElementById("editTierSelect").value;
    const player = playersCache.find(p => p.id === editingPlayerId);

    const newKits = { ...player.kits };
    newKits[editingKit] = newTier;

    await playersCol.doc(editingPlayerId).update({ kits: newKits });

    await loadPlayers();
    render();
    closeModal();
}

function closeModal() {
    document.getElementById("editModal").classList.remove("active");
    document.getElementById("profileModal").classList.remove("active");
    document.getElementById("modalBackdrop").classList.remove("active");
}

// COMPUTE
function getTierPoints(tier) { return TIER_POINTS[tier] || 0; }

function computeOverallPoints(player) {
    let total = 0;
    ALL_KITS.forEach(kit => {
        if (kit.name !== "Overall") {
            total += getTierPoints(player.kits?.[kit.name] || "Unranked");
        }
    });
    return total;
}

function getSortedPlayersByPoints() {
    return [...playersCache].sort((a,b) => computeOverallPoints(b) - computeOverallPoints(a));
}

// RENDER (TVŮJ PŮVODNÍ KÓD – BEZ ZMĚN)
function render() {
    const sortedPlayers = getSortedPlayersByPoints();

    const kitTabsContainer = document.getElementById('kitTabs');
    kitTabsContainer.innerHTML = '';
    ALL_KITS.forEach(kit => {
        const tab = document.createElement('div');
        tab.className = `kit-tab ${kit.name === currentKit ? 'active' : ''}`;
        tab.innerHTML = `<span class="kit-icon">${kit.icon}</span> ${kit.name}`;
        tab.onclick = () => {
            currentKit = kit.name;
            searchQuery = '';
            render();
        };
        kitTabsContainer.appendChild(tab);
    });

    if (currentKit === 'Overall') {
        document.getElementById('rankingContainer').classList.add('active');
        document.getElementById('tierlistContainer').classList.remove('active');
        renderOverallRanking();
    } else {
        document.getElementById('rankingContainer').classList.remove('active');
        document.getElementById('tierlistContainer').classList.add('active');

        const tierlistDiv = document.getElementById('tierlistContainer');
        tierlistDiv.innerHTML = '';

        if (sortedPlayers.length === 0) {
            tierlistDiv.innerHTML = '<div class="empty-message">Žádní hráči. Přidej si někoho!</div>';
            return;
        }

        const tierGroups = {};
        ALL_TIERS.forEach(tier => {
            tierGroups[tier] = sortedPlayers.filter(p => (p.kits?.[currentKit] || 'Unranked') === tier);
        });

        ALL_TIERS.forEach(tier => {
            const tierPlayers = tierGroups[tier];
            if (!tierPlayers || tierPlayers.length === 0) return;

            const section = document.createElement('div');
            section.className = `tier-section tier-${tier.replace(/\s+/g, '-')}`;

            const header = document.createElement('div');
            header.className = 'tier-header';
            header.innerHTML = `
                <div class="tier-line"></div>
                <div class="tier-title">${tier}</div>
                <div class="tier-line"></div>
            `;
            section.appendChild(header);

            const playersDiv = document.createElement('div');
            playersDiv.className = 'tier-players';

            tierPlayers.forEach(player => {
                const playerCard = document.createElement('div');
                playerCard.className = `tier-player-card tier-${tier.replace(/\s+/g, '-')}`;
                const tierLabel = TIER_LABELS[tier];
                playerCard.innerHTML = `
                    <button class="delete-tier-btn" onclick="deletePlayer('${player.id}'); event.stopPropagation();">×</button>
                    <img src="${MC_HEADS_URL}${player.name}/64.png?size=64" alt="${player.name}" class="tier-player-avatar">
                    <div class="player-info">
                        <div class="player-info-name">${player.name}</div>
                        <div class="player-info-score">Skóre: ${getTierPoints(tier)}</div>
                    </div>
                    <div class="tier-badge" onclick="openEditModal('${player.id}', '${currentKit}')">${tierLabel}</div>
                `;
                playerCard.onclick = (e) => {
                    if (e.target.classList.contains('delete-tier-btn') || e.target.classList.contains('tier-badge')) return;
                    openProfileModal(player.id);
                };
                playersDiv.appendChild(playerCard);
            });

            section.appendChild(playersDiv);
            tierlistDiv.appendChild(section);
        });
    }
}

function renderOverallRanking() {
    const sortedPlayers = getSortedPlayersByPoints();
    const rankingDiv = document.getElementById('overallRanking');
    
    rankingDiv.innerHTML = `
        <h2>Žebříček - Overall</h2>
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput"
                placeholder="🔍 Hledej hráče..."
                onkeyup="handleSearch(this.value)"
            >
        </div>
    `;

    const filteredPlayers = searchQuery 
        ? sortedPlayers.filter(p => p.name.toLowerCase().includes(searchQuery))
        : sortedPlayers;

    if (filteredPlayers.length === 0) {
        rankingDiv.innerHTML += '<div class="empty-message">Žádní hráči. Přidej si někoho!</div>';
        return;
    }

    filteredPlayers.forEach((player, index) => {
        const tierPoints = computeOverallPoints(player);
        const item = document.createElement('div');
        item.className = 'ranking-item';
        
        if (index === 0) item.classList.add('rank-1');
        else if (index === 1) item.classList.add('rank-2');
        else if (index === 2) item.classList.add('rank-3');
        else item.classList.add('rank-other');
        
        item.style.cursor = 'pointer';
        
        let tierBadgesHTML = '';
        ALL_KITS.forEach(kit => {
            if (kit.name !== 'Overall') {
                const tier = player.kits?.[kit.name] || 'Unranked';
                
                if (tier === 'Unranked') return;
                
                const kitEmoji = KIT_EMOJIS[kit.name] || '❓';
                const tierLabel = TIER_LABELS[tier];
                const points = getTierPoints(tier);
                const tierColor = TIER_COLORS[tier];
                
                tierBadgesHTML += `
                    <div class="tier-icon-badge" style="border-color: ${tierColor}; background: linear-gradient(135deg, ${tierColor}22 0%, ${tierColor}11 100%);">
                        <div class="tier-emoji">${kitEmoji}</div>
                        <div class="tier-icon-label" style="background: ${tierColor}; color: #fff;">${tierLabel}</div>
                        <div class="tier-tooltip">${kit.name} - ${tier} (${points} bodů)</div>
                    </div>
                `;
            }
        });
        
        item.innerHTML = `
            <div class="ranking-left">
                <div class="ranking-number">#${index + 1}</div>
                <img src="${MC_HEADS_URL}${player.name}/64.png?size=64" alt="${player.name}" class="ranking-avatar">
                <div class="ranking-info">
                    <div class="ranking-name">${player.name}</div>
                    <div class="ranking-points">${tierPoints} Bodů</div>
                </div>
            </div>
            <div class="tier-badges-wrapper">
                ${tierBadgesHTML}
            </div>
        `;
        
        item.onclick = () => openProfileModal(player.id);
        rankingDiv.appendChild(item);
    });
}

function handleSearch(q) {
    searchQuery = q.toLowerCase();
    renderOverallRanking();
}

// START
loadPlayers().then(render);
</script>
